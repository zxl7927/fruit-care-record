<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8f4" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111814" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="施肥记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>果蔬施肥浇水记录</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f3;
      --panel: #ffffff;
      --text: #202522;
      --muted: #657067;
      --line: #dfe5dc;
      --soft: #f8faf6;
      --green: #2f7d57;
      --blue: #3d6fb6;
      --red: #c2574a;
      --yellow: #d99c29;
      --ink: #17201b;
      --radius: 18px;
      --radius-sm: 14px;
      --tap: 48px;
      --shadow: 0 10px 28px rgba(28, 41, 32, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-x: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: min(560px, 100%);
      margin: 0 auto;
      padding: calc(10px + env(safe-area-inset-top)) 14px calc(92px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 14px;
      padding: 10px 2px 6px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      color: var(--ink);
    }

    .subtitle {
      display: none;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 100%;
    }

    .actions .btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    .btn {
      min-height: var(--tap);
      padding: 0 16px;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 850;
      box-shadow: none;
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
      min-width: 0;
    }

    .app-page:not(.active) {
      display: none !important;
    }

    .app-page.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      padding: 8px max(10px, env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-right));
      background: rgba(255, 255, 255, 0.94);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -6px 18px rgba(23, 32, 27, 0.08);
    }

    .bottom-nav button {
      min-height: 54px;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      display: grid;
      place-items: center;
    }

    .bottom-nav button.active {
      background: color-mix(in srgb, var(--green) 12%, #fff);
      color: var(--green);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .form-panel {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .form-panel .panel-title,
    .form-panel > input[type="hidden"],
    .form-panel #fertilizerField,
    .form-panel .form-actions,
    .form-panel .field:has(textarea) {
      grid-column: 1 / -1;
    }

    .form-panel > .row {
      display: contents;
    }

    .form-panel > .field,
    .form-panel > .row > .field {
      margin-bottom: 0;
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 850;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #f6f7f6;
      color: var(--text);
      min-height: var(--tap);
      padding: 12px 14px;
      outline: none;
      font-size: 16px;
    }

    .custom-input {
      display: none;
      margin-top: 8px;
    }

    .custom-input.show {
      display: block;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.45;
    }

    .select-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #f8faf7;
      overflow: hidden;
    }

    .select-panel summary {
      cursor: pointer;
      min-height: var(--tap);
      padding: 13px 14px;
      color: var(--text);
      font-size: 16px;
      list-style-position: inside;
    }

    .select-panel[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .multi-options {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
      padding: 10px;
    }

    .multi-option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
    }

    .multi-option input {
      width: 20px;
      height: 20px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .fertilizer-dose-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .fertilizer-dose-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--soft);
      align-items: start;
    }

    .fertilizer-dose-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      padding-top: 8px;
      overflow-wrap: anywhere;
    }

    .mini-field {
      display: grid;
      gap: 5px;
    }

    .mini-field label {
      font-size: 12px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 125, 87, 0.16);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .crop-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .crop-choice {
      min-height: 48px;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 7px;
      align-items: center;
    }

    .crop-choice.active {
      border-color: var(--crop);
      box-shadow: inset 0 0 0 2px var(--crop);
      background: color-mix(in srgb, var(--crop) 9%, #fff);
    }

    .crop-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--crop);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .crop-name {
      display: block;
      font-weight: 800;
      line-height: 1.2;
    }

    .crop-hint {
      display: none;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .form-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .content {
      display: grid;
      gap: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    #summary {
      display: block;
    }

    .summary-wrap {
      display: grid;
      gap: 8px;
    }

    .summary-more {
      grid-column: 1 / -1;
    }

    .summary-more .summary {
      margin-top: 8px;
    }

    .crop-card {
      padding: 8px;
      min-height: auto;
      border-top: 4px solid var(--crop);
    }

    .home-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .home-head h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 950;
    }

    .home-task-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .home-task-card h3,
    .home-section-head h3 {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
    }

    .home-task-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .home-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 10px;
    }

    .home-section-head span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .plant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      min-width: 0;
    }

    .plant-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: left;
      box-shadow: var(--shadow);
      padding: 0;
      color: var(--text);
      min-width: 0;
      min-height: 220px;
    }

    .plant-photo {
      position: relative;
      min-height: 148px;
      aspect-ratio: 1 / 0.78;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--crop) 45%, #ffffff), color-mix(in srgb, var(--crop) 15%, #17201b)),
        #dfe5dc;
      background-size: cover;
      background-position: center;
    }

    .plant-photo .health-pill,
    .plant-photo .day-pill {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      padding: 4px 8px;
    }

    .plant-photo .health-pill {
      top: 8px;
      right: 8px;
    }

    .plant-photo .day-pill {
      left: 8px;
      bottom: 8px;
      color: #fff;
      background: rgba(23, 32, 27, 0.46);
    }

    .plant-card-body {
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .plant-card-body strong {
      font-size: 19px;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .plant-card-body span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .plant-detail-hero {
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      margin-bottom: 10px;
    }

    .plant-detail-hero .plant-photo {
      min-height: 180px;
    }

    .plant-detail-body {
      padding: 12px;
      display: grid;
      gap: 7px;
    }

    .plant-detail-hero.detail-full .plant-photo {
      min-height: 260px;
    }

    .plant-detail-name {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .plant-detail-name h3 {
      margin: 0;
      font-size: 24px;
      color: var(--ink);
    }

    .plant-detail-name .health-pill {
      border-radius: 999px;
      background: color-mix(in srgb, var(--crop) 14%, #fff);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .detail-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px;
      background: #f8faf7;
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .detail-stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .detail-stat strong {
      color: var(--ink);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .quick-actions .btn {
      justify-content: center;
      padding: 10px 8px;
      min-height: 52px;
    }

    .detail-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin: 12px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .detail-tab {
      min-height: 42px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      padding: 0 10px;
    }

    .detail-tab.active {
      background: color-mix(in srgb, var(--crop) 14%, #fff);
      border-color: var(--crop);
      color: var(--green);
      box-shadow: inset 0 -2px 0 var(--crop);
    }

    .detail-tab-panel:not(.active) {
      display: none;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .album-grid .empty {
      grid-column: 1 / -1;
    }

    .album-photo {
      min-height: 150px;
      border-radius: var(--radius);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .album-photo span {
      position: absolute;
      left: 8px;
      bottom: 8px;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(23, 32, 27, 0.55);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .timeline h3 {
      margin: 10px 0 2px;
      font-size: 18px;
      color: var(--ink);
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 6px;
      position: relative;
    }

    .timeline-item::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--crop);
      position: absolute;
      left: -4px;
      top: 18px;
    }

    .timeline-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .timeline-head strong {
      color: var(--ink);
      font-size: 15px;
    }

    .timeline-head span,
    .timeline-detail {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .timeline-photo {
      min-height: 120px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      border: 1px solid var(--line);
    }

    .task-form {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 16px;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .task-columns {
      display: grid;
      gap: 12px;
    }

    .task-columns h3 {
      margin: 4px 0 8px;
      font-size: 18px;
      color: var(--ink);
    }

    .task-list {
      display: grid;
      gap: 8px;
    }

    .task-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 8px;
      border-left: 4px solid var(--crop);
      box-shadow: var(--shadow);
    }

    .task-card.done {
      opacity: 0.78;
      background: #f8faf7;
    }

    .task-card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .task-card-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .task-card-title strong {
      color: var(--ink);
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .task-card-title span,
    .task-card-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-actions .btn {
      min-height: 34px;
      padding: 7px 10px;
    }

    .btn.danger {
      color: #b42323;
      border-color: #f0b8b8;
      background: #fff7f7;
    }

    .calendar-weekdays,
    .calendar-month {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .calendar-weekdays {
      margin: 8px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .calendar-day {
      min-height: 62px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 5px;
      padding: 7px 4px;
      font-weight: 800;
      box-shadow: none;
    }

    .calendar-day.muted {
      color: #a6aea8;
      background: #f8faf7;
    }

    .calendar-day.today {
      border-color: var(--green);
      box-shadow: inset 0 0 0 2px var(--green);
      color: var(--green);
    }

    .calendar-day.selected {
      background: color-mix(in srgb, var(--green) 10%, #fff);
    }

    .calendar-dots {
      display: flex;
      justify-content: center;
      gap: 4px;
      min-height: 8px;
    }

    .calendar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: block;
    }

    .calendar-dot.record {
      background: #2e92f2;
    }

    .calendar-dot.task {
      background: var(--green);
    }

    .calendar-day-detail {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .calendar-day-detail h3 {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
    }

    .calendar-detail-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 5px;
    }

    .calendar-detail-card strong {
      color: var(--ink);
    }

    .calendar-detail-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .material-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .material-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 8px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--green);
    }

    .material-card.expired {
      border-left-color: #d95757;
    }

    .material-card.used {
      border-left-color: #9aa3a0;
      opacity: 0.82;
    }

    .material-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .material-head strong {
      color: var(--ink);
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .material-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .material-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      align-items: end;
      background: rgba(17, 24, 20, 0.42);
      padding: 16px;
    }

    .sheet-backdrop[hidden] {
      display: none;
    }

    .sheet-panel {
      width: min(100%, 560px);
      max-height: calc(100vh - 34px);
      overflow: auto;
      margin: 0 auto;
      border-radius: 18px 18px 8px 8px;
      background: #fff;
      padding: 10px 14px 16px;
      box-shadow: 0 -16px 40px rgba(23, 32, 27, 0.22);
    }

    .sheet-handle {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: #dfe5dc;
      margin: 0 auto 12px;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sheet-head h2 {
      margin: 0;
      font-size: 20px;
      color: var(--ink);
    }

    .plant-form {
      display: grid;
      gap: 10px;
    }

    .plant-photo-preview {
      min-height: 132px;
      border: 1px dashed #cfd8d0;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      background:
        linear-gradient(145deg, rgba(53, 198, 118, 0.14), rgba(43, 183, 213, 0.12)),
        #f8faf7;
      background-size: cover;
      background-position: center;
    }

    .plant-photo-preview.has-photo {
      color: transparent;
      border-style: solid;
    }

    .crop-card h2 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      color: var(--text);
      text-align: right;
    }

    .records-panel {
      padding: 12px;
    }

    .records-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .records-head .panel-title {
      margin: 0;
    }

    .bulk-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .bulk-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .plan-panel {
      padding: 12px;
    }

    .guidance-panel {
      padding: 12px;
    }

    .guidance-box {
      display: grid;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    .guidance-box p {
      margin: 0;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
    }

    .guidance-box .empty {
      padding: 14px 10px;
      text-align: left;
      background: #fff;
    }

    .panel-heading {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel-heading .panel-title {
      margin: 0;
    }

    .month-select {
      width: 130px;
      flex: 0 0 auto;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .stock-tools {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .compact-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
      padding: 0;
    }

    .compact-details summary {
      cursor: pointer;
      padding: 9px 11px;
      color: var(--ink);
      font-weight: 800;
      list-style-position: inside;
    }

    .compact-details[open] {
      padding: 0 10px 10px;
    }

    .compact-details[open] summary {
      padding-left: 0;
      padding-right: 0;
    }

    .check-card {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 7px;
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--text);
      font-weight: 700;
      font-size: 12px;
    }

    .check-card span {
      min-width: 0;
      flex: 1;
    }

    .check-card input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .stock-delete {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
      flex: 0 0 auto;
      line-height: 1;
    }

    .stock-delete {
      color: var(--red);
    }

    .stock-pick-delete {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      flex: 0 0 auto;
    }

    .stock-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .plan-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .plan-card {
      border: 1px solid var(--line);
      border-left: 5px solid var(--crop);
      border-radius: 8px;
      background: #fff;
      padding: 9px;
    }

    .plan-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .plan-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .month-badge {
      border-radius: 999px;
      background: color-mix(in srgb, var(--crop) 14%, #fff);
      color: var(--ink);
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .plan-line {
      margin: 5px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .plan-line strong {
      color: var(--text);
    }

    .decision {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      background: var(--green);
    }

    .decision.wait {
      background: var(--yellow);
      color: #3e2b00;
    }

    .decision.skip {
      background: var(--muted);
    }

    .plan-warn {
      margin-top: 6px;
      padding: 7px 8px;
      border-radius: 7px;
      background: #fff7e6;
      color: #7a4d00;
      font-size: 13px;
      line-height: 1.4;
    }

    .recipe-list {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .recipe {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8faf6;
      padding: 8px;
    }

    .recipe-title {
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }

    .recipe-detail {
      margin: 4px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .recipe-detail strong {
      color: var(--text);
    }

    .seedling-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .seedling-list p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .seedling-list strong {
      color: var(--text);
    }

    .brief-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 8px 0;
    }

    .brief-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 7px 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .brief-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .brief-item.full {
      grid-column: 1 / -1;
    }

    .pest-panel {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8faf6;
      padding: 10px;
    }

    .pest-panel.active {
      display: grid;
    }

    .record-subtext {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .advice-details {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      margin-top: 8px;
    }

    .advice-details summary {
      cursor: pointer;
      padding: 8px 9px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      list-style-position: inside;
    }

    .advice-details[open] {
      padding: 0 9px 8px;
    }

    .advice-details[open] summary {
      padding-left: 0;
      padding-right: 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 6px;
    }

    .form-advice {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      background: var(--soft);
      padding: 9px 10px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    .form-advice.show {
      display: grid;
      gap: 5px;
    }

    .form-advice strong {
      color: var(--ink);
    }

    .form-advice p {
      margin: 0;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .table-wrap {
      display: grid;
      gap: 8px;
    }

    .record-list {
      display: grid;
      gap: 8px;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .record-card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .record-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-weight: 800;
    }

    .record-date {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .record-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .record-meta span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .record-note {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      border-top: 1px solid var(--line);
      padding-top: 7px;
    }

    .record-pager {
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 4px 0;
    }

    .record-pager .btn {
      width: 100%;
      justify-content: center;
    }

    .record-page-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      color: #fff;
      background: var(--crop, var(--green));
      font-weight: 800;
      white-space: nowrap;
    }

    .type {
      font-weight: 800;
      color: var(--blue);
    }

    .type.feed {
      color: var(--yellow);
    }

    .record-actions {
      display: flex;
      gap: 8px;
      min-width: 124px;
    }

    .icon-btn {
      width: var(--tap);
      height: var(--tap);
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 900;
      font-size: 20px;
    }

    .icon-btn.danger {
      color: var(--red);
    }

    .row-check {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    img,
    video,
    canvas,
    svg {
      max-width: 100%;
    }

    .content,
    .summary,
    .filters,
    .plan-grid,
    .stock-grid,
    .record-list,
    .task-columns,
    .material-list,
    .calendar-month,
    .calendar-weekdays,
    .table-wrap {
      min-width: 0;
      max-width: 100%;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .record-card,
    .task-card,
    .material-card,
    .calendar-detail-card,
    .recipe,
    .plan-card,
    .crop-card {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .records-panel,
    .plan-panel,
    .guidance-panel {
      padding: 16px;
    }

    .record-card,
    .recipe,
    .plan-card,
    .crop-card {
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 940px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
        display: grid;
      }

      .topbar {
        align-items: start;
      }

      .actions {
        justify-content: start;
      }

      .form-panel {
        position: static;
      }

      .summary,
      .stock-grid,
      .plan-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .stock-grid,
      .plan-grid,
      .stock-add {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #111814;
        --panel: #18211c;
        --text: #e8eee9;
        --muted: #a8b5ad;
        --line: #2d3a33;
        --soft: #1d2822;
        --ink: #f5f8f5;
        --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      }

      input,
      select,
      textarea,
      .btn.secondary,
      .plant-card,
      .home-task-card,
      .task-form,
      .task-card,
      .material-card,
      .timeline-item,
      .calendar-detail-card,
      .record-card,
      .panel,
      .select-panel {
        background: var(--panel);
      }

      .bottom-nav {
        background: rgba(18, 25, 21, 0.94);
      }
    }

    @media (max-width: 620px) {
      .app {
        width: 100%;
        padding: calc(10px + env(safe-area-inset-top)) 14px calc(96px + env(safe-area-inset-bottom));
      }

      .summary,
      .filters,
      .row,
      .records-head,
      .panel-heading,
      .fertilizer-dose-row {
        grid-template-columns: 1fr;
      }

      .records-head {
        display: grid;
        align-items: stretch;
      }

      .bulk-actions {
        justify-content: stretch;
      }

      .panel-heading {
        display: grid;
        align-items: stretch;
      }

      .month-select {
        width: 100%;
      }

      .btn {
        width: auto;
        justify-content: center;
      }

      .topbar {
        gap: 8px;
        margin-bottom: 8px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .form-panel,
      .plan-panel,
      .records-panel {
        padding: 16px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .crop-card {
        padding: 12px;
      }

      th,
      td {
        padding: 9px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>果蔬施肥浇水记录</h1>
        <p class="subtitle">记录浇水施肥，并按作物状态给出配料、养护和修剪建议。</p>
      </div>
      <div class="actions">
        <button class="btn secondary" id="exportBtn" type="button" title="导出 CSV">导出</button>
        <button class="btn secondary" id="backupBtn" type="button" title="备份到手机文件">备份</button>
        <button class="btn secondary" id="restoreBtn" type="button" title="从备份恢复">恢复</button>
        <button class="btn secondary" id="sampleBtn" type="button" title="填入示例数据">示例</button>
        <input id="restoreInput" type="file" accept="application/json,.json" hidden>
      </div>
    </header>

    <section class="layout">
      <section class="app-page active" id="page-home" data-page-panel="home">
        <div class="home-head">
          <h2>我的花园</h2>
          <button class="icon-btn" type="button" id="homeAddRecordBtn" title="添加植物">+</button>
        </div>
        <section class="home-task-card">
          <div>
            <h3>今日任务</h3>
            <p id="todayTaskText">今天没有任务，好好休息吧~</p>
          </div>
          <button class="btn secondary" type="button" id="viewTasksBtn">查看</button>
        </section>
        <section class="home-section-head">
          <h3>植物</h3>
          <span id="plantCountText">0 株</span>
        </section>
        <div class="plant-grid" id="plantGrid"></div>
      </section>

      <section class="panel plan-panel app-page" id="plantDetailPage" data-page-panel="plant-detail">
        <div class="panel-heading">
          <button class="icon-btn" type="button" id="plantDetailBackBtn" title="返回">‹</button>
          <h2 class="panel-title" id="plantDetailTitle">植物详情</h2>
        </div>
        <div id="plantDetailContent"></div>
        <input id="detailPhotoInput" type="file" accept="image/*" capture="environment" hidden>
      </section>

      <form class="panel form-panel app-page" id="recordForm" data-page-panel="records">
        <h2 class="panel-title" id="formTitle">新增记录</h2>
        <input type="hidden" id="recordId">

        <div class="field">
          <label for="cropInput">作物</label>
          <select id="cropInput"></select>
        </div>

        <div class="field">
          <label for="plantingInput">种植方式</label>
          <select id="plantingInput">
            <option value="盆栽">盆栽</option>
            <option value="地栽">地栽</option>
          </select>
        </div>

        <div class="row">
          <div class="field">
            <label for="dateInput">日期</label>
            <input id="dateInput" type="date" required>
          </div>
          <div class="field">
            <label for="typeInput">类型</label>
            <select id="typeInput" required>
              <option value="浇水">浇水</option>
              <option value="施肥">施肥</option>
              <option value="修剪">修剪</option>
              <option value="病虫害">病虫害</option>
              <option value="拍照">拍照</option>
              <option value="笔记">笔记</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field" id="amountField">
            <label for="amountInput">用量</label>
            <select id="amountInput"></select>
            <input class="custom-input" id="customAmountInput" type="text" placeholder="输入其他用量">
          </div>
          <div class="field" id="fertilizerField">
            <label>肥料</label>
            <select id="recipeInput"></select>
            <details class="select-panel" open>
              <summary id="fertilizerSummary">选择肥料</summary>
              <div class="multi-options" id="fertilizerInput"></div>
            </details>
            <input class="custom-input" id="customFertilizerRecordInput" type="text" placeholder="输入其他肥料名称，多个用顿号分隔">
            <div class="fertilizer-dose-list" id="fertilizerDoseList"></div>
          </div>
        </div>

        <div class="field custom-input" id="dilutionField">
          <label for="dilutionInput">稀释比例</label>
          <select id="dilutionInput"></select>
          <input class="custom-input" id="customDilutionInput" type="text" placeholder="输入其他稀释比例">
        </div>

        <div class="field">
          <label for="growthInput">生长情况</label>
          <select id="growthInput">
            <option value="正常">正常</option>
            <option value="长势弱">长势弱</option>
            <option value="叶片发黄">叶片发黄</option>
            <option value="徒长">徒长</option>
            <option value="不开花">不开花</option>
            <option value="落花落果">落花落果</option>
            <option value="果实膨大慢">果实膨大慢</option>
            <option value="叶缘焦枯">叶缘焦枯</option>
            <option value="病虫害疑似">病虫害疑似</option>
          </select>
        </div>

        <div class="form-advice custom-input" id="formAdviceBox"></div>

        <div class="pest-panel" id="pestPanel">
          <div class="field">
            <label for="pestProblemInput">病虫害类型</label>
            <select id="pestProblemInput">
              <option value="未确认">未确认</option>
              <option value="蚜虫/粉虱/蓟马/介壳虫">蚜虫/粉虱/蓟马/介壳虫</option>
              <option value="红蜘蛛/螨类">红蜘蛛/螨类</option>

    function emptyData() {

    function hashText(value) {
      let hash = 0;
      String(value || "").split("").forEach(char => {
        hash = ((hash << 5) - hash + char.charCodeAt(0)) | 0;
      });
      return Math.abs(hash).toString(36);
    }

    function makeId(prefix, seed = "") {
      return seed ? `${prefix}-${hashText(seed)}` : `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function safeJson(value, fallback) {
      try {
        const parsed = JSON.parse(value);
        return parsed ?? fallback;
      } catch {
        return fallback;
      }
    }

    function plantFromCrop(cropName, variety = "", note = "") {
      const crop = cropMeta(cropName);
      return {
        id: makeId("plant", crop.name),
        name: crop.name,
        variety: variety || defaultVariety(crop.name),
        category: crop.name,
        photo: "",
        health: "健康",
        createdAt: new Date().toISOString(),
        note: note || crop.hint || ""
      };
    }

    function normalizePlant(plant) {
      const fallback = plantFromCrop(plant?.name || "蓝莓", plant?.variety || "");
      return {
        id: plant?.id || fallback.id,
        name: plant?.name || fallback.name,
        variety: plant?.variety || fallback.variety,
        category: plant?.category || plant?.name || fallback.category,
        photo: plant?.photo || "",
        health: plant?.health || "健康",
        createdAt: plant?.createdAt || fallback.createdAt,
        note: plant?.note || ""
      };
    }

    function normalizeRecord(record, plantMap) {
      const cropName = record.crop || plantMap.get(record.plantId)?.name || crops[0].name;
      const plant = record.plantId && plantMap.has(record.plantId)
        ? plantMap.get(record.plantId)
        : plantFromCrop(cropName, record.variety || defaultVariety(cropName));
      if (!plantMap.has(plant.id)) plantMap.set(plant.id, plant);
      return {
        ...record,
        id: record.id || makeId("record"),
        plantId: record.plantId || plant.id,
        crop: record.crop || plant.name,
        type: record.type || "浇水",
        date: record.date || today(),
        amount: record.amount || "",
        fertilizer: record.fertilizer || "",
        dilution: record.dilution || "",
        note: record.note || "",
        photo: record.photo || "",
        createdAt: record.createdAt || Date.now()
      };
    }

    function normalizeTask(task, plants = appData.plants || []) {
      return {
        id: task?.id || makeId("task"),
        plantId: task?.plantId || plants[0]?.id || "",
        type: taskTypes.includes(task?.type) ? task.type : "浇水",
        nextDate: task?.nextDate || today(),
        cycleDays: Number(task?.cycleDays) || 0,
        enabled: task?.enabled !== false,
        completedAt: task?.completedAt || "",
        note: task?.note || ""
      };
    }

    function materialFromName(name, kind, active = true, status = "有效", existing = {}) {
      return {
        id: existing.id || makeId("material", `${kind}:${name}`),
        name,
        kind,
        stock: active && status !== "已删除" ? (existing.stock || 1) : 0,
        unit: existing.unit || "件",
        buyDate: existing.buyDate || "",
        expireDate: existing.expireDate || "",
        status,
        note: existing.note || ""
      };
    }

    function normalizeMaterial(material) {
      const rawStatus = material?.status || (Number(material?.stock) > 0 ? "有效" : "已用完");
      const status = rawStatus === "已停用" ? "已用完" : rawStatus;
      return materialFromName(
        material?.name || "未命名",
        material?.kind || "肥料",
        Number(material?.stock) > 0,
        status,
        material || {}
      );
    }

    function materialMap(materials) {
      return new Map((materials || []).map(item => [`${item.kind}:${item.name}`, item]));
    }

    function buildMaterials(existingMaterials, legacy, preserveExisting = false) {
      const existing = materialMap(existingMaterials.map(normalizeMaterial));
      const output = new Map();
      const add = (name, kind, active = true, status = "有效") => {
        if (!name) return;
        const key = `${kind}:${name}`;
        if (preserveExisting && existing.has(key) && status !== "已删除") {
          output.set(key, existing.get(key));
          return;
        }
        const previous = existing.get(key);
        const preservedStatus = previous && ["过期", "已用完"].includes(previous.status) ? previous.status : status;
        output.set(key, materialFromName(name, kind, active && preservedStatus === "有效", preservedStatus, previous));
      };

      const fertilizerDeleted = new Set(legacy.deletedFertilizers || []);
      const fertilizerActive = new Set([...(legacy.fertilizerStock || []), ...ownedFertilizers]);
      [...baseFertilizers, ...(legacy.customFertilizers || []), ...fertilizerDeleted].forEach(name => {
        add(name, "肥料", fertilizerActive.has(name) && !fertilizerDeleted.has(name), fertilizerDeleted.has(name) ? "已删除" : "有效");
      });

      const pesticideDeleted = new Set(legacy.deletedPesticides || []);
      const pesticideActive = new Set([...(legacy.pesticideStock || []), ...basePesticides.map(item => item.name)]);
      [...basePesticides.map(item => item.name), ...(legacy.customPesticides || []), ...pesticideDeleted].forEach(name => {
        add(name, "药剂", pesticideActive.has(name) && !pesticideDeleted.has(name), pesticideDeleted.has(name) ? "已删除" : "有效");
      });

      existing.forEach((item, key) => {
        if (!output.has(key)) output.set(key, item);
      });
      return [...output.values()];
    }

    function migrateOldData(source = {}) {
      const stored = source.stored && !Array.isArray(source.stored) ? source.stored : {};
      const legacy = source.legacy || {};
      const data = {
        plants: Array.isArray(stored.plants) ? stored.plants.map(normalizePlant) : [],
        records: Array.isArray(stored.records) ? stored.records : [],
        tasks: Array.isArray(stored.tasks) ? stored.tasks : [],
        materials: Array.isArray(stored.materials) ? stored.materials.map(normalizeMaterial) : []
      };
      const plantMap = new Map(data.plants.map(plant => [plant.id, plant]));
      const legacyRecords = Array.isArray(legacy.records) ? legacy.records : [];
      const recordSource = data.records.length ? data.records : legacyRecords;

      crops.forEach(crop => {
        const plant = plantFromCrop(crop.name, defaultVariety(crop.name));
        if (!plantMap.has(plant.id)) plantMap.set(plant.id, plant);
      });

      data.records = recordSource.map(record => normalizeRecord(record, plantMap));
      data.plants = [...plantMap.values()].map(normalizePlant);
      data.tasks = data.tasks.map(task => normalizeTask(task, data.plants));
      data.materials = buildMaterials(data.materials, legacy, Boolean(source.stored));
      return data;
    }

    function loadData() {
      const stored = safeJson(localStorage.getItem(appDataKey), null);
      const legacy = stored ? {} : {
        records: safeJson(localStorage.getItem(storageKey), []),
        fertilizerStock: safeJson(localStorage.getItem(stockKey), null) || ["有机肥", "平衡水溶肥", "高钾肥"],
        customFertilizers: safeJson(localStorage.getItem(customFertilizerKey), []),
        deletedFertilizers: safeJson(localStorage.getItem(deletedFertilizerKey), []),
        pesticideStock: safeJson(localStorage.getItem(pesticideStockKey), null) || basePesticides.map(item => item.name),
        customPesticides: safeJson(localStorage.getItem(customPesticideKey), []),
        deletedPesticides: safeJson(localStorage.getItem(deletedPesticideKey), [])
      };
      const data = migrateOldData({ stored, legacy });
      return data;
    }

    function syncDataFromGlobals() {
      const plantMap = new Map((appData.plants || []).map(plant => [plant.id, normalizePlant(plant)]));
      appData.records = records.map(record => normalizeRecord(record, plantMap));
      appData.plants = [...plantMap.values()];
      appData.materials = buildMaterials(appData.materials || [], {
        fertilizerStock,
        customFertilizers,
        deletedFertilizers,
        pesticideStock,
        customPesticides,
        deletedPesticides
      });
      syncStockArraysFromMaterials();
      appData.tasks = Array.isArray(appData.tasks) ? appData.tasks.map(task => normalizeTask(task, appData.plants)) : [];
    }

    function saveData(data = appData) {
      if (data !== appData) appData = migrateOldData({ stored: data, legacy: {} });
      syncDataFromGlobals();
      localStorage.setItem(appDataKey, JSON.stringify(appData));
    }

      if (material.status === "已删除") return "已删除";
      if (material.status === "已用完") return "已用完";
      if (material.expireDate && material.expireDate < today()) return "过期";
      return material.status || "有效";
    }

    function daysUntilDate(dateString) {
      if (!dateString) return Infinity;
      const start = new Date(today() + "T00:00:00");
      const end = new Date(dateString + "T00:00:00");
      return Math.ceil((end - start) / 86400000);
    }

    function syncStockArraysFromMaterials() {
      const active = (appData.materials || []).filter(item => materialDisplayStatus(item) === "有效" && Number(item.stock) > 0);
      fertilizerStock = active.filter(item => item.kind === "肥料").map(item => item.name);

        .filter(item => item.kind === "肥料" && item.status !== "已删除" && !baseFertilizers.includes(item.name))

      customPesticides = (appData.materials || [])
        .filter(item => item.kind === "药剂" && item.status !== "已删除" && !basePesticides.some(base => base.name === item.name))
        .map(item => item.name);
      deletedFertilizers = (appData.materials || [])
        .filter(item => item.kind === "肥料" && item.status === "已删除")
        .map(item => item.name);
      deletedPesticides = (appData.materials || [])
        .filter(item => item.kind === "药剂" && item.status === "已删除")
        .map(item => item.name);

        name,
        type: "自定义药物",

    function cropMeta(name) {
      return crops.find(crop => crop.name === name) || crops[0];

    function defaultVariety(cropName) {
      return cropMeta(cropName).varieties[0] || "";
    }

    function plantForCrop(cropName) {
      const fallback = plantFromCrop(cropName, defaultVariety(cropName));
      let plant = appData.plants.find(item => item.name === cropName || item.category === cropName);
      if (!plant) {
        plant = fallback;
        appData.plants.push(plant);
      }
      return plant;
    }

    function daysSince(dateString) {
      if (!dateString) return "无记录";
      const start = new Date(dateString + "T00:00:00");
      const now = new Date(today() + "T00:00:00");
      const days = Math.max(0, Math.round((now - start) / 86400000));
      return days === 0 ? "今天" : `${days} 天前`;
    }

    function daysBetween(dateString) {
      if (!dateString) return Infinity;
      const start = new Date(dateString + "T00:00:00");
      const now = new Date(today() + "T00:00:00");
      return Math.max(0, Math.round((now - start) / 86400000));

    function compressImageToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          resolve("");
          return;
        }
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("图片读取失败"));
        reader.onload = () => {
          const image = new Image();
          image.onerror = () => reject(new Error("图片解析失败"));
          image.onload = () => {
            const maxSide = 900;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.72));
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function profileForRule(rule, growth) {
      if (growth.level === "skip") return formulaProfiles.organic;
      if (rule.need.includes("高钾肥")) return `${formulaProfiles.highK} ${formulaProfiles.calMag}`;
      if (rule.need.includes("磷钾肥")) return formulaProfiles.flowerRoot;
      if (rule.need.includes("钙镁肥") || rule.need.includes("微量元素")) return formulaProfiles.calMag;
      if (rule.need.includes("平衡水溶肥")) return formulaProfiles.balance;
      return formulaProfiles.organic;
    }

    function recipePriority(recipe, rule, growth) {
      let score = recipe.tags.filter(tag => rule.need.includes(tag)).length * 10;
      if (growth.level === "feed" && recipe.tags.some(tag => ["高钾肥", "钙镁肥", "微量元素", "磷钾肥"].includes(tag))) score += 4;
      if (growth.level === "wait" && recipe.tags.includes("有机肥")) score += 2;
      if (/徒长/.test(growth.status || "") && recipe.tags.includes("氮肥/尿素")) score -= 8;
      if (/果实膨大慢|落花落果/.test(growth.status || "") && recipe.tags.includes("高钾肥")) score += 5;
      if (/叶片发黄/.test(growth.status || "") && recipe.tags.some(tag => ["微量元素", "钙镁肥"].includes(tag))) score += 5;
      return score;
    }

    function recipeComponents(recipe) {
      const seen = new Set();
      return recipe.components.map(component => {
        const match = stockMatchForRole(component.role, component.prefer);
        if (!match || seen.has(match)) return null;
        seen.add(match);
        return { name: match, ratio: component.ratio, role: component.role };
      }).filter(Boolean);
    }

    function doseForPlan(rule, growth, application, planting = els.planting.value) {
      const low = growth.level === "feed" ? "从 0.5-1 克/升试起" : "按 1 克/升以内";
      if (application.startsWith("叶喷优先")) return `${low}，叶喷 1:1500-1:2000，傍晚喷叶背到湿而不滴；若还要灌根，至少间隔 24 小时，弱苗或高温间隔 48 小时。`;
      if (rule.need.includes("有机肥")) return "灌根或浅埋后浇透；菌剂、海藻、黄腐酸单独低浓度更稳；叶喷另选海藻/氨基酸/螯合微量元素，和灌根间隔 24-48 小时。";
      return planting === "地栽"
        ? `${low}，灌根 1:800-1:1200；地栽沿根区外缘少量施入。叶喷辅助时 1:1500，和灌根间隔 24 小时。`
        : `${low}，灌根 1:1200-1:1500；盆栽宁淡勿浓。叶喷辅助时 1:2000，和灌根间隔 24-48 小时。`;
    }

    function ratioNumber(ratio = "1份") {
      const match = String(ratio).match(/\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : 1;
    }

    function formatGram(value) {
      const rounded = Math.round(value * 10) / 10;
      return `${Number.isInteger(rounded) ? rounded : rounded.toFixed(1)} 克`;
    }

    function amountForComponent(component, recipe, planting) {
      const ratio = ratioNumber(component.ratio);
      const organicLike = component.role === "有机肥" && /养根|改土|有机/.test(recipe.name);
      if (organicLike) {
        return formatGram((planting === "地栽" ? 20 : 5) * ratio / 3);
      }
      return formatGram((planting === "地栽" ? 1 : 0.5) * ratio);
    }

    function dilutionForPlan(rule, growth, application, planting) {
      if (application.startsWith("叶喷优先")) return planting === "地栽" ? "1:1500" : "1:2000";
      if (rule.need.includes("有机肥")) return "不稀释";
      return planting === "地栽" ? "1:1000" : "1:1500";
    }

    function halfAmount(amount) {
      const match = String(amount || "").match(/\d+(?:\.\d+)?/);
      if (!match) return amount || "";
      return formatGram(Number(match[0]) / 2);
    }

    function rootPlanText(items, planting) {
      if (!items.length) return "灌根：当前库存缺少主要材料，先补齐配料。";
      const detail = items.map(item => `${item.name} ${item.amount}/${item.dilution || "不稀释"}`).join(" + ");
      const method = planting === "地栽"
        ? "沿根区外缘或滴水线少量慢浇，施后补清水；不要浇到主干根颈。"
        : "沿盆边慢浇到基质湿润，避免积水和浓肥贴根；盆土过干时先清水润盆再灌肥。";
      return `灌根：${detail}，${method}`;
    }

    function foliarPlanText(items, rule, planting) {
      const sprayable = items.filter(item => !/有机肥|骨粉|颗粒|菌/.test(item.name));
      if (!sprayable.length) {
        return "叶喷：本方案以有机/颗粒/菌剂为主，不建议叶喷；需要叶面补充时另用螯合微量元素或海藻氨基酸低浓度喷施。";
      }
      const dilution = planting === "地栽" ? "1:1500" : "1:2000";
      const detail = sprayable.map(item => `${item.name} ${halfAmount(item.amount)}/${dilution}`).join(" + ");
      return `叶喷：${detail}，傍晚喷叶背到湿而不滴，先小范围试喷；叶喷间隔 3-5 天，缺素明显可 3 天后复查再喷；花期、高温正午、雨前不喷。`;
    }

    function rootFoliarIntervalText(growth, planting, temp = "") {
      const value = temp === "" || Number.isNaN(Number(temp)) ? "" : Number(temp);
      const cautious = growth.level === "feed" || planting === "盆栽" || (value !== "" && value >= 30);
      const gap = cautious ? 48 : 24;
      const order = /叶片发黄|不开花|落花落果/.test(growth.status || "")
        ? "先叶喷快速补微量元素，间隔后再低浓度灌根。"
        : "先灌根补根区营养，间隔后再叶喷作辅助。";
      return `叶喷/灌根间隔：不要同一天叠加；建议间隔 ${gap} 小时。${order}叶喷单独间隔 3-5 天；同一周最多 1 次灌根 + 2 次叶喷，弱苗只保留一种。`;
    }

    function purchaseAdviceText(missing, cropName) {
      if (!missing.length) return "购买建议：当前库存能覆盖本阶段关键需求，暂不必新增肥料。";
      const suggestions = {
        "蓝莓酸性肥": cropName === "蓝莓"
          ? "蓝莓酸性肥可买硫酸铵、酸性植物专用肥或蓝莓专用肥；避免长期使用硝态氮偏高的肥。"
          : "酸性专用肥可作为喜酸作物辅助，不是通用必买项。",
        "高钾肥": "高钾肥可买硫酸钾、磷酸二氢钾，或参考 15-5-30、15-10-30、13-5-40 这类高钾大量元素水溶肥。",
        "钙镁肥": cropName === "蓝莓"
          ? "钙镁肥可优先买螯合钙镁、钙镁硼锌铁中量元素肥；蓝莓慎用硝酸钙类，避免抬高根区盐分和硝态氮。"
          : "钙镁肥可买钙镁硼锌铁中量元素肥、螯合钙镁，或参考 15-5-15+Ca+Mg、17-3-17 Cal-Mag 型谱。",
        "磷钾肥": "磷钾肥可买磷酸二氢钾、脱脂骨粉，或参考 10-30-20、15-30-15 这类促根促花型水溶肥。",
        "平衡水溶肥": "平衡肥可买 20-20-20+TE、18-18-18+TE 或 20-10-20 这类通用平衡型水溶肥。",
        "微量元素": "微量元素可买螯合多微元素、硼锌铁锰组合、钙镁硼锌铁中量元素肥；花果期尤其注意硼、锌、铁。",
        "有机肥": "有机肥可买腐熟羊粪/鸡粪、有机颗粒肥、鱼蛋白、海藻精、矿源黄腐酸钾或腐殖酸类产品。"
      };
      return `购买建议：${missing.map(role => suggestions[role] || `${role} 可买对应专用肥，优先选择标注清晰、含量明确的产品。`).join(" ")}`;
    }

    function baseFertilizerGuidance(rule, growth, planting, cropName) {
      const organicStage = rule.need.includes("有机肥") || /休眠|养根|采后|改土|基肥|备土/.test(rule.stage);
      if (growth.level === "skip") {
        return "底肥/追肥指导：当前先不埋底肥、不追速效肥；先处理病虫害、烂根、积水或药害风险，恢复后再低量试施。";
      }
      if (!organicStage) {
        return "底肥/追肥指导：本阶段不建议临时重埋底肥，优先用低浓度灌根或叶喷微调；若刚换盆/定植，可只混少量缓释肥或腐熟有机质，避免烧根。";
      }
      if (planting === "地栽") {
        return cropName === "蓝莓"
          ? "底肥/浅埋指导：蓝莓地栽以酸性有机质、松针/树皮、腐熟有机肥少量改土为主，浅混在根区外围，避免石灰、草木灰和高盐底肥。"
          : "底肥/浅埋指导：地栽可在滴水线外缘浅沟施腐熟有机肥或缓释肥，覆土后浇透；不要贴主根，不要一次大量堆肥。";
      }
      return cropName === "蓝莓"
        ? "底肥/浅埋指导：蓝莓盆栽只建议少量酸性有机质或蓝莓专用缓释肥拌在盆边表层，宁少勿多，避免高盐颗粒肥贴根。"
        : "底肥/浅埋指导：盆栽若基质已肥沃，本轮不必再埋底肥；需要补底肥时只在盆边浅埋少量腐熟有机肥或缓释肥，再浇透观察。";
    }

    function timingGuidance(rule, growth, cropName) {
      const lastFeed = latest(records.filter(record => record.crop === cropName), "施肥");
      const feedDays = daysBetween(lastFeed?.date);
      const interval = safeFertilizerInterval(rule, growth, els.planting.value || "盆栽", els.temperature.value);
      if (growth.level === "skip") return "时机判断：当前状态不适合施肥。";
      if (feedDays !== Infinity && feedDays < interval) {
        return `时机判断：距离上次施肥 ${feedDays} 天，少于本阶段缩短后的建议间隔 ${interval} 天，本轮可先观察；确有缺素信号时只做极低浓度叶喷，和下次灌根至少间隔 24-48 小时。`;
      }
      if (feedDays === Infinity) return "时机判断：没有历史施肥记录，可从推荐量的半量开始试施。";
      return `时机判断：距离上次施肥 ${feedDays} 天，已达到缩短后的 ${interval} 天窗口，可按低浓度方案执行；灌根和叶喷分开安排。`;
    }

    function currentRecipeContext() {
      const rule = ruleForMonth(selectedCrop, currentMonth());
      const growth = analyzeGrowthStatus(els.growth.value || "正常", els.note.value || "");
      growth.status = els.growth.value || "正常";
      const cropRecords = records.filter(record => record.crop === selectedCrop);
      const feed = latest(cropRecords, "施肥");
      const water = latest(cropRecords, "浇水");
      const available = matchedFertilizer(rule);
      const planting = els.planting.value || "盆栽";
      const temp = els.temperature.value;
      const interval = safeFertilizerInterval(rule, growth, planting, temp);
      const decision = fertilizerDecision(
        cropMeta(selectedCrop),
        rule,
        daysBetween(feed?.date),
        daysBetween(water?.date),
        planting,
        available,
        growth,
        interval
      );
      return { rule, growth, planting, decision, interval };
    }

    function actionGuidanceForDecision(context) {
      const { rule, growth, planting, decision } = context;
      const stockAnalysis = analyzeFertilizerStockForRule(rule);
      const habit = cropHabitProfiles[selectedCrop] || "按当前月份、生长状态和库存肥料做低浓度、少量多次的管理。";
      const purchaseAdvice = purchaseAdviceText(stockAnalysis.missing, selectedCrop);
      const baseAdvice = baseFertilizerGuidance(rule, growth, planting, selectedCrop);
      const timingAdvice = timingGuidance(rule, growth, selectedCrop);
      const nextAction = decision.type === "wait"
        ? "当前适合：先观察、补清水、检查根区湿度或补齐库存，不启用一键配肥。"
        : "当前适合：不施速效肥，先做养护、清园、控水、病虫害处理或少量有机质改土。";
      return `${selectedCrop}${planting}当前不生成一键配料。${nextAction} 原因：${decision.label}，${decision.text} 习性需求：${habit} 当前阶段：${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}；植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice}`;
    }

    function renderRecipeGuidance(text = "") {
      lastRecipeGuidance = text;
      if (!text) {
        els.recipeGuidance.innerHTML = `<div class="empty">选择一键配料方案后，这里会显示购买建议、底肥指导、灌根和叶喷方案。</div>`;
        return;
      }
      const parts = String(text)
        .split(/(?<=。)/)
        .map(item => item.trim())
        .filter(Boolean);
      els.recipeGuidance.innerHTML = parts
        .map(part => `<p>${escapeHtml(part)}</p>`)
        .join("");
    }

    function recipePlanOptions() {
      if (els.type.value !== "施肥") return [];
      const context = currentRecipeContext();
      const { rule, growth, planting, decision } = context;
      if (!decision.recipe) return [];
      const application = applicationAdvice(rule, growth);
      const stockAnalysis = analyzeFertilizerStockForRule(rule);
      const habit = cropHabitProfiles[selectedCrop] || "按当前月份、生长状态和库存肥料做低浓度、少量多次的配肥。";
      const purchaseAdvice = purchaseAdviceText(stockAnalysis.missing, selectedCrop);
      const baseAdvice = baseFertilizerGuidance(rule, growth, planting, selectedCrop);
      const timingAdvice = timingGuidance(rule, growth, selectedCrop);
      const plans = recipesForRule(rule, growth).map(recipe => {
        const components = recipeComponents(recipe);
        const parts = components.map(component => component.name);
        const ratios = components.map(component => `${component.name}${component.ratio ? ` ${component.ratio}` : ""}`);
        const profile = profileForRule(rule, growth);
        const dose = doseForPlan(rule, growth, application, planting);
        const dilution = dilutionForPlan(rule, growth, application, planting);
        const items = components.map(component => ({
          name: component.name,
          amount: amountForComponent(component, recipe, planting),
          dilution
        }));
        const rootPlan = rootPlanText(items, planting);
        const foliarPlan = foliarPlanText(items, rule, planting);
        const intervalPlan = rootFoliarIntervalText(growth, planting, els.temperature.value);
        return {
          name: recipe.name,
          planting,
          fertilizer: parts.join("、"),
          dilution,
          items,
          note: `${selectedCrop}${planting}${recipe.name}：${ratios.length ? ratios.join(" + ") : "当前库存缺少主要材料"}。习性需求：${habit} 当前阶段：${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}；植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice} 品牌型谱：${profile} ${rootPlan} ${foliarPlan} ${intervalPlan} 阶段建议：${dose} 施用方式：${application}。注意：${recipe.caution}`
        };
      }).filter(plan => plan.fertilizer);
      if (plans.length) return plans;
      return [{
        name: "库存不足购买建议",
        planting,
        fertilizer: stockAnalysis.missing.length ? `建议购买：${stockAnalysis.missing.join("、")}` : "暂不施肥",
        dilution: "",
        items: [],
        note: `${selectedCrop}${planting}库存不足购买建议：当前 ${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}。习性需求：${habit} 植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice} 暂无可直接生成的配料，先补齐库存或改用低风险有机养护。`
      }];
    }

    function renderRecipeOptions() {
      const plans = recipePlanOptions();
      if (els.type.value === "施肥" && !plans.length) {
        const context = currentRecipeContext();
        els.recipe.innerHTML = `<option value="">${escapeHtml(context.decision.label)}：当前不生成配料</option>`;
        els.recipe.disabled = true;
        renderRecipeGuidance(actionGuidanceForDecision(context));
        return;
      }
      els.recipe.innerHTML = `<option value="">一键配料方案</option>` + plans
        .map((plan, index) => {
          const doseText = plan.items.length
            ? plan.items.map(item => `${item.name}${item.amount}/${item.dilution}`).join("；")
            : plan.fertilizer;
          return `<option value="${index}">${escapeHtml(plan.planting)}｜${escapeHtml(plan.name)}：${escapeHtml(doseText)}</option>`;
        })
        .join("");
      els.recipe.disabled = !plans.length || els.type.value !== "施肥";
      renderRecipeGuidance();
    }

    function applyRecipeOption() {
      const plans = recipePlanOptions();
      const plan = plans[Number(els.recipe.value)];
      if (!plan) {
        renderRecipeGuidance();
        return;
      }
      renderRecordFertilizerOptions(plan.items);
      renderRecipeGuidance(plan.note);
      toggleCustomInputs();
      renderPlans();
    }

    function toggleCustomInputs() {
      const isFeeding = els.type.value === "施肥";
      els.amountField.classList.toggle("custom-input", isFeeding);
      els.amountField.classList.toggle("show", !isFeeding);
      document.getElementById("fertilizerField").classList.toggle("custom-input", !isFeeding);
      document.getElementById("fertilizerField").classList.toggle("show", isFeeding);
      els.dilutionField.classList.toggle("show", false);
      els.customAmount.classList.toggle("show", !isFeeding && els.amount.value === "其他");
      els.customFertilizerRecord.classList.toggle("show", isFeeding);
      els.customDilution.classList.toggle("show", false);
    }

    function selectedAmountValue() {
      if (els.type.value === "施肥") {
        return selectedFertilizerItems()
          .map(item => `${item.name} ${item.amount}`)
          .join("；");
      }
      return els.amount.value === "其他" ? els.customAmount.value.trim() : els.amount.value;
    }

    function selectedFertilizerValue() {
      return selectedFertilizerItems().map(item => item.name).join("、");
    }

    function selectedDilutionValue() {
      if (els.type.value !== "施肥") return "";
      return selectedFertilizerItems()
        .map(item => `${item.name} ${item.dilution || "不稀释"}`)
        .join("；");
    }

    function selectedTemperatureValue() {
      return els.temperature.value === "" ? "" : Number(els.temperature.value);
    }

    function splitAmountAndDilution(amount, dilution) {
      if (dilution || !amount) return { amount: amount || "", dilution: dilution || "" };
      const match = amount.match(/(1:\d+)\s*稀释?/);
      if (!match) return { amount, dilution: "" };
      return { amount: "", dilution: match[1] };
    }

    function renderFertilizerStock() {
      const names = allFertilizers();
      selectedFertilizersToDelete = new Set([...selectedFertilizersToDelete].filter(name => names.includes(name)));
      updateFertilizerDeleteStatus();
      els.fertilizerStock.innerHTML = names.map(name => `
        <label class="check-card">
          <input class="stock-active" type="checkbox" value="${escapeHtml(name)}" ${fertilizerStock.includes(name) ? "checked" : ""}>
          <span>${escapeHtml(name)}</span>
          <input class="stock-pick-delete" type="checkbox" title="选择后批量删除" data-pick-delete-fertilizer="${escapeHtml(name)}" ${selectedFertilizersToDelete.has(name) ? "checked" : ""}>
          <button class="stock-delete" type="button" title="删除肥料" data-delete-fertilizer="${escapeHtml(name)}">删</button>
        </label>
      `).join("");

      els.fertilizerStock.querySelectorAll(".stock-active").forEach(input => {
        input.addEventListener("change", () => {
          fertilizerStock = [...els.fertilizerStock.querySelectorAll(".stock-active:checked")].map(item => item.value);
          saveFertilizerStock();
          refreshAfterFertilizerStockChange();
        });
      });

      els.fertilizerStock.querySelectorAll("[data-pick-delete-fertilizer]").forEach(input => {
        input.addEventListener("change", () => {
          const name = input.dataset.pickDeleteFertilizer;
          if (input.checked) {
            selectedFertilizersToDelete.add(name);
          } else {
            selectedFertilizersToDelete.delete(name);
          }
          updateFertilizerDeleteStatus();
        });
      });

      els.fertilizerStock.querySelectorAll("[data-delete-fertilizer]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const name = button.dataset.deleteFertilizer;
          deleteFertilizer(name);
        });
      });

    }

    function deleteFertilizer(name) {
      deleteFertilizers([name]);
    }

    function deleteFertilizers(names) {
      const uniqueNames = [...new Set(names)].filter(Boolean);
      if (!uniqueNames.length) return;
      fertilizerStock = fertilizerStock.filter(item => !uniqueNames.includes(item));
      customFertilizers = customFertilizers.filter(item => !uniqueNames.includes(item));
      uniqueNames.forEach(name => {
        if (baseFertilizers.includes(name) && !deletedFertilizers.includes(name)) {
          deletedFertilizers.push(name);
        }
        selectedFertilizersToDelete.delete(name);
      });
      saveFertilizerStock();
      renderFertilizerStock();
      refreshAfterFertilizerStockChange();
    }

    function deleteSelectedFertilizers() {
      deleteFertilizers([...selectedFertilizersToDelete]);
    }

    function updateFertilizerDeleteStatus() {
      if (!els.fertilizerDeleteStatus || !els.deleteSelectedFertilizers) return;
      const count = selectedFertilizersToDelete.size;
      els.fertilizerDeleteStatus.textContent = `待删 ${count} 个肥料`;
      els.deleteSelectedFertilizers.disabled = count === 0;
    }

    function renderPesticideStock() {
      const names = allPesticides();
      selectedPesticidesToDelete = new Set([...selectedPesticidesToDelete].filter(name => names.includes(name)));
      updatePesticideDeleteStatus();
      els.pesticideStock.innerHTML = names.map(name => {
        const meta = pesticideMeta(name);
        return `
          <label class="check-card" title="${escapeHtml(meta.target)} ${escapeHtml(meta.caution)}">
            <input class="pesticide-active" type="checkbox" value="${escapeHtml(name)}" ${pesticideStock.includes(name) ? "checked" : ""}>
            <span>${escapeHtml(name)}<br><small>${escapeHtml(meta.type)}</small></span>
            <input class="stock-pick-delete" type="checkbox" title="选择后批量删除" data-pick-delete-pesticide="${escapeHtml(name)}" ${selectedPesticidesToDelete.has(name) ? "checked" : ""}>
            <button class="stock-delete" type="button" title="删除药物" data-delete-pesticide="${escapeHtml(name)}">删</button>
          </label>
        `;
      }).join("");

      els.pesticideStock.querySelectorAll(".pesticide-active").forEach(input => {
        input.addEventListener("change", () => {

          savePesticideStock();
          renderPlans();
        });
      });

          } else {
