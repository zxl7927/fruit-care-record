<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f7d57">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="施肥记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>果蔬施肥浇水记录</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f3;
      --panel: #ffffff;
      --text: #202522;
      --muted: #657067;
      --line: #dfe5dc;
      --soft: #f8faf6;
      --green: #2f7d57;
      --blue: #3d6fb6;
      --red: #c2574a;
      --yellow: #d99c29;
      --ink: #17201b;
      --shadow: 0 4px 14px rgba(28, 41, 32, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 10px 0 82px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 10px;
      padding: 8px 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.08;
      font-weight: 800;
      color: var(--ink);
    }

    .subtitle {
      display: none;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 34px;
      padding: 0 10px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      box-shadow: none;
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
    }

    .app-page:not(.active) {
      display: none !important;
    }

    .app-page.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      padding: 6px max(8px, env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-right));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--line);
      box-shadow: 0 -6px 18px rgba(23, 32, 27, 0.08);
    }

    .bottom-nav button {
      min-height: 46px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .bottom-nav button.active {
      background: color-mix(in srgb, var(--green) 12%, #fff);
      color: var(--green);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px 10px;
      align-items: start;
    }

    .form-panel .panel-title,
    .form-panel > input[type="hidden"],
    .form-panel #fertilizerField,
    .form-panel .form-actions,
    .form-panel .field:has(textarea) {
      grid-column: 1 / -1;
    }

    .form-panel > .row {
      display: contents;
    }

    .form-panel > .field,
    .form-panel > .row > .field {
      margin-bottom: 0;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 17px;
      line-height: 1.2;
    }

    .field {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 7px 9px;
      outline: none;
    }

    .custom-input {
      display: none;
      margin-top: 8px;
    }

    .custom-input.show {
      display: block;
    }

    textarea {
      min-height: 58px;
      resize: vertical;
    }

    .select-panel {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .select-panel summary {
      cursor: pointer;
      padding: 8px 10px;
      color: var(--text);
      font-size: 14px;
      list-style-position: inside;
    }

    .select-panel[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .multi-options {
      display: grid;
      gap: 4px;
      max-height: 190px;
      overflow: auto;
      padding: 8px;
    }

    .multi-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .multi-option input {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .fertilizer-dose-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .fertilizer-dose-row {
      display: grid;
      grid-template-columns: minmax(88px, 1fr) minmax(110px, 1fr) minmax(110px, 1fr);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      align-items: start;
    }

    .fertilizer-dose-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      padding-top: 8px;
      overflow-wrap: anywhere;
    }

    .mini-field {
      display: grid;
      gap: 5px;
    }

    .mini-field label {
      font-size: 12px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 125, 87, 0.16);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .crop-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .crop-choice {
      min-height: 48px;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 7px;
      align-items: center;
    }

    .crop-choice.active {
      border-color: var(--crop);
      box-shadow: inset 0 0 0 2px var(--crop);
      background: color-mix(in srgb, var(--crop) 9%, #fff);
    }

    .crop-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--crop);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .crop-name {
      display: block;
      font-weight: 800;
      line-height: 1.2;
    }

    .crop-hint {
      display: none;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .form-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .content {
      display: grid;
      gap: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    #summary {
      display: block;
    }

    .summary-wrap {
      display: grid;
      gap: 8px;
    }

    .summary-more {
      grid-column: 1 / -1;
    }

    .summary-more .summary {
      margin-top: 8px;
    }

    .crop-card {
      padding: 8px;
      min-height: auto;
      border-top: 4px solid var(--crop);
    }

    .crop-card h2 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      color: var(--text);
      text-align: right;
    }

    .records-panel {
      padding: 12px;
    }

    .records-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .records-head .panel-title {
      margin: 0;
    }

    .bulk-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .bulk-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .plan-panel {
      padding: 12px;
    }

    .guidance-panel {
      padding: 12px;
    }

    .guidance-box {
      display: grid;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    .guidance-box p {
      margin: 0;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
    }

    .guidance-box .empty {
      padding: 14px 10px;
      text-align: left;
      background: #fff;
    }

    .panel-heading {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel-heading .panel-title {
      margin: 0;
    }

    .month-select {
      width: 130px;
      flex: 0 0 auto;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .stock-tools {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .compact-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
      padding: 0;
    }

    .compact-details summary {
      cursor: pointer;
      padding: 9px 11px;
      color: var(--ink);
      font-weight: 800;
      list-style-position: inside;
    }

    .compact-details[open] {
      padding: 0 10px 10px;
    }

    .compact-details[open] summary {
      padding-left: 0;
      padding-right: 0;
    }

    .check-card {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 7px;
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--text);
      font-weight: 700;
      font-size: 12px;
    }

    .check-card span {
      min-width: 0;
      flex: 1;
    }

    .check-card input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .stock-delete {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
      flex: 0 0 auto;
      line-height: 1;
    }

    .stock-delete {
      color: var(--red);
    }

    .stock-pick-delete {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      flex: 0 0 auto;
    }

    .stock-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .plan-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .plan-card {
      border: 1px solid var(--line);
      border-left: 5px solid var(--crop);
      border-radius: 8px;
      background: #fff;
      padding: 9px;
    }

    .plan-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .plan-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .month-badge {
      border-radius: 999px;
      background: color-mix(in srgb, var(--crop) 14%, #fff);
      color: var(--ink);
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .plan-line {
      margin: 5px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .plan-line strong {
      color: var(--text);
    }

    .decision {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      background: var(--green);
    }

    .decision.wait {
      background: var(--yellow);
      color: #3e2b00;
    }

    .decision.skip {
      background: var(--muted);
    }

    .plan-warn {
      margin-top: 6px;
      padding: 7px 8px;
      border-radius: 7px;
      background: #fff7e6;
      color: #7a4d00;
      font-size: 13px;
      line-height: 1.4;
    }

    .recipe-list {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .recipe {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8faf6;
      padding: 8px;
    }

    .recipe-title {
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }

    .recipe-detail {
      margin: 4px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .recipe-detail strong {
      color: var(--text);
    }

    .brief-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 8px 0;
    }

    .brief-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 7px 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .brief-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .brief-item.full {
      grid-column: 1 / -1;
    }

    .pest-panel {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8faf6;
      padding: 10px;
    }

    .pest-panel.active {
      display: grid;
    }

    .record-subtext {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .advice-details {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      margin-top: 8px;
    }

    .advice-details summary {
      cursor: pointer;
      padding: 8px 9px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      list-style-position: inside;
    }

    .advice-details[open] {
      padding: 0 9px 8px;
    }

    .advice-details[open] summary {
      padding-left: 0;
      padding-right: 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 6px;
    }

    .form-advice {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      background: var(--soft);
      padding: 9px 10px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    .form-advice.show {
      display: grid;
      gap: 5px;
    }

    .form-advice strong {
      color: var(--ink);
    }

    .form-advice p {
      margin: 0;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .table-wrap {
      display: grid;
      gap: 8px;
    }

    .record-list {
      display: grid;
      gap: 8px;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .record-card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .record-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-weight: 800;
    }

    .record-date {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .record-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .record-meta span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .record-note {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      border-top: 1px solid var(--line);
      padding-top: 7px;
    }

    .record-pager {
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 4px 0;
    }

    .record-pager .btn {
      width: 100%;
      justify-content: center;
    }

    .record-page-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      color: #fff;
      background: var(--crop, var(--green));
      font-weight: 800;
      white-space: nowrap;
    }

    .type {
      font-weight: 800;
      color: var(--blue);
    }

    .type.feed {
      color: var(--yellow);
    }

    .record-actions {
      display: flex;
      gap: 8px;
      min-width: 124px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .icon-btn.danger {
      color: var(--red);
    }

    .row-check {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 940px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
        display: grid;
      }

      .topbar {
        align-items: start;
      }

      .actions {
        justify-content: start;
      }

      .form-panel {
        position: static;
      }

      .summary,
      .stock-grid,
      .plan-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .stock-grid,
      .plan-grid,
      .stock-add {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 12px, 1180px);
        padding-top: 10px;
      }

      .summary,
      .filters,
      .row,
      .records-head,
      .panel-heading,
      .crop-grid,
      .fertilizer-dose-row {
        grid-template-columns: 1fr;
      }

      .records-head {
        display: grid;
        align-items: stretch;
      }

      .bulk-actions {
        justify-content: stretch;
      }

      .panel-heading {
        display: grid;
        align-items: stretch;
      }

      .month-select {
        width: 100%;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .topbar {
        gap: 8px;
        margin-bottom: 8px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .form-panel,
      .plan-panel,
      .records-panel {
        padding: 10px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .crop-card {
        padding: 8px;
      }

      th,
      td {
        padding: 9px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>果蔬施肥浇水记录</h1>
        <p class="subtitle">记录浇水施肥，并按作物状态给出配料、养护和修剪建议。</p>
      </div>
      <div class="actions">
        <button class="btn secondary" id="exportBtn" type="button" title="导出 CSV">导出</button>
        <button class="btn secondary" id="backupBtn" type="button" title="备份到手机文件">备份</button>

    }

    function daysSince(dateString) {
      if (!dateString) return "无记录";
      const start = new Date(dateString + "T00:00:00");
      const now = new Date(today() + "T00:00:00");
      const days = Math.max(0, Math.round((now - start) / 86400000));
      return days === 0 ? "今天" : `${days} 天前`;
    }

    function daysBetween(dateString) {
      if (!dateString) return Infinity;
      const start = new Date(dateString + "T00:00:00");
      const now = new Date(today() + "T00:00:00");
      return Math.max(0, Math.round((now - start) / 86400000));
    }

      els.variety.value = value || "";
    }

    function renderFilters() {
      els.cropFilter.innerHTML = `<option value="全部">全部作物</option>` + crops
        .map(crop => `<option value="${crop.name}">${crop.name}</option>`)
        .join("");
    }

    function renderMonthOptions() {
      const thisMonth = new Date(today() + "T00:00:00").getMonth() + 1;
      els.planMonth.innerHTML = Array.from({ length: 12 }, (_, index) => {
        const month = index + 1;
        const suffix = month === thisMonth ? "（当前）" : "";
        return `<option value="${month}" ${month === thisMonth ? "selected" : ""}>${month}月${suffix}</option>`;
      }).join("");
    }

    function amountOptions() {
      if (els.type.value === "浇水") {
        return ["1 升", "1.5 升", "2 升", "3 升", "5 升", "浇透", "其他"];
      }
      return Array.from({ length: 10 }, (_, index) => `${(index + 1) * 0.5} 克`).concat("其他");
    }

    function dilutionOptions() {
      return ["不稀释", "1:300", "1:500", "1:800", "1:1000", "1:1500", "1:2000", "其他"];
    }

    function renderAmountOptions(selected = "") {
      const options = amountOptions();
      const value = options.includes(selected) ? selected : selected ? "其他" : options[0];
      els.amount.innerHTML = options.map(option => `<option value="${option}">${option}</option>`).join("");
      els.amount.value = value;
      els.customAmount.value = value === "其他" ? selected : "";
      toggleCustomInputs();
    }

    function renderDilutionOptions(selected = "") {
      const options = dilutionOptions();
      const value = options.includes(selected) ? selected : selected ? "其他" : "不稀释";
      els.dilution.innerHTML = options.map(option => `<option value="${option}">${option}</option>`).join("");
      els.dilution.value = value;
      els.customDilution.value = value === "其他" ? selected : "";
      toggleCustomInputs();
    }

    function splitFertilizerNames(value) {
      return String(value || "")
        .split(/[、,，;；\n]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function refreshAfterFertilizerStockChange(selected = selectedFertilizerValue()) {
      renderRecordFertilizerOptions(selected);
      renderRecipeOptions();
      renderPlans();
    }

    function normalizeFertilizerItems(selected = "") {
      if (Array.isArray(selected)) {
        return selected.map(item => ({
          name: item.name || "",
          amount: item.amount || "",
          dilution: item.dilution || "不稀释"
        })).filter(item => item.name);
      }
      if (selected && Array.isArray(selected.fertilizerItems)) {
        return normalizeFertilizerItems(selected.fertilizerItems);
      }
      const names = splitFertilizerNames(typeof selected === "object" ? selected.fertilizer : selected);
      if (!names.length) return [];
      return names.map(name => ({ name, amount: "", dilution: "不稀释" }));
    }

    function selectedFertilizerItems() {
      if (els.type.value !== "施肥") return [];
      const checkedNames = [...els.fertilizer.querySelectorAll(".record-fertilizer-check:checked")]
        .map(input => input.value);
      const customNames = splitFertilizerNames(els.customFertilizerRecord.value);
      const names = [...new Set([...checkedNames, ...customNames])];
      return names.map(name => {
        const row = els.fertilizerDoseList.querySelector(`[data-fertilizer-row="${CSS.escape(name)}"]`);
        const amountSelect = row?.querySelector("[data-dose-amount]");
        const customAmount = row?.querySelector("[data-dose-custom-amount]");
        const dilutionSelect = row?.querySelector("[data-dose-dilution]");
        const customDilution = row?.querySelector("[data-dose-custom-dilution]");
        const amount = amountSelect?.value === "其他" ? customAmount?.value.trim() : amountSelect?.value;
        const dilution = dilutionSelect?.value === "其他" ? customDilution?.value.trim() : dilutionSelect?.value;
        return {
          name,
          amount: amount || amountOptions()[0],
          dilution: dilution || "不稀释"
        };
      });
    }

    function optionHtml(options, selected) {
      const value = options.includes(selected) ? selected : selected ? "其他" : options[0];
      return options.map(option => `<option value="${escapeHtml(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("");
    }

    function renderFertilizerDoseRows(items = selectedFertilizerItems()) {
      const normalized = normalizeFertilizerItems(items);
      els.fertilizerSummary.textContent = normalized.length ? `已选 ${normalized.length} 种肥料` : "选择肥料";
      els.fertilizerDoseList.innerHTML = normalized.map(item => {
        const amountChoices = amountOptions();
        const dilutionChoices = dilutionOptions();
        const amountValue = amountChoices.includes(item.amount) ? item.amount : item.amount ? "其他" : amountChoices[0];
        const dilutionValue = dilutionChoices.includes(item.dilution) ? item.dilution : item.dilution ? "其他" : "不稀释";
        return `
          <div class="fertilizer-dose-row" data-fertilizer-row="${escapeHtml(item.name)}">
            <div class="fertilizer-dose-name">${escapeHtml(item.name)}</div>
            <div class="mini-field">
              <label>用量</label>
              <select data-dose-amount>${optionHtml(amountChoices, item.amount)}</select>
              <input class="custom-input ${amountValue === "其他" ? "show" : ""}" data-dose-custom-amount type="text" value="${amountValue === "其他" ? escapeHtml(item.amount) : ""}" placeholder="输入用量">
            </div>
            <div class="mini-field">
              <label>稀释比例</label>
              <select data-dose-dilution>${optionHtml(dilutionChoices, item.dilution)}</select>
              <input class="custom-input ${dilutionValue === "其他" ? "show" : ""}" data-dose-custom-dilution type="text" value="${dilutionValue === "其他" ? escapeHtml(item.dilution) : ""}" placeholder="输入比例">
            </div>
          </div>
        `;
      }).join("");
      els.fertilizerDoseList.querySelectorAll("select").forEach(select => {
        select.addEventListener("change", () => {
          const custom = select.parentElement.querySelector(".custom-input");
          custom?.classList.toggle("show", select.value === "其他");
        });
      });
    }

    function renderRecordFertilizerOptions(selected = "") {
      const selectedItems = normalizeFertilizerItems(selected);
      const stock = fertilizerStock.length ? fertilizerStock : allFertilizers();
      const selectedNames = new Set(selectedItems.map(item => item.name));
      const customNames = selectedItems
        .map(item => item.name)
        .filter(name => !stock.includes(name));
      els.fertilizer.innerHTML = stock.map(name => `
        <label class="multi-option">
          <input class="record-fertilizer-check" type="checkbox" value="${escapeHtml(name)}" ${selectedNames.has(name) ? "checked" : ""}>
          <span>${escapeHtml(name)}</span>
        </label>
      `).join("");
      els.customFertilizerRecord.value = customNames.join("、");
      renderFertilizerDoseRows(selectedItems);
      toggleCustomInputs();
      renderRecipeOptions();
    }

    function profileForRule(rule, growth) {
      if (growth.level === "skip") return formulaProfiles.organic;
      if (rule.need.includes("高钾肥")) return `${formulaProfiles.highK} ${formulaProfiles.calMag}`;
      if (rule.need.includes("磷钾肥")) return formulaProfiles.flowerRoot;
      if (rule.need.includes("钙镁肥") || rule.need.includes("微量元素")) return formulaProfiles.calMag;
      if (rule.need.includes("平衡水溶肥")) return formulaProfiles.balance;
      return formulaProfiles.organic;
    }

    function recipePriority(recipe, rule, growth) {
      let score = recipe.tags.filter(tag => rule.need.includes(tag)).length * 10;
      if (growth.level === "feed" && recipe.tags.some(tag => ["高钾肥", "钙镁肥", "微量元素", "磷钾肥"].includes(tag))) score += 4;
      if (growth.level === "wait" && recipe.tags.includes("有机肥")) score += 2;
      if (/徒长/.test(growth.status || "") && recipe.tags.includes("氮肥/尿素")) score -= 8;
      if (/果实膨大慢|落花落果/.test(growth.status || "") && recipe.tags.includes("高钾肥")) score += 5;
      if (/叶片发黄/.test(growth.status || "") && recipe.tags.some(tag => ["微量元素", "钙镁肥"].includes(tag))) score += 5;
      return score;
    }

    function recipeComponents(recipe) {
      const seen = new Set();
      return recipe.components.map(component => {
        const match = stockMatchForRole(component.role, component.prefer);
        if (!match || seen.has(match)) return null;
        seen.add(match);
        return { name: match, ratio: component.ratio, role: component.role };
      }).filter(Boolean);
    }

    function doseForPlan(rule, growth, application, planting = els.planting.value) {
      const low = growth.level === "feed" ? "从 0.5-1 克/升试起" : "按 1 克/升以内";
      if (application.startsWith("叶喷优先")) return `${low}，叶喷 1:1500-1:2000，傍晚喷叶背到湿而不滴；若还要灌根，至少间隔 48 小时。`;
      if (rule.need.includes("有机肥")) return "灌根或浅埋后浇透；菌剂、海藻、黄腐酸单独低浓度更稳；叶喷另选海藻/氨基酸/螯合微量元素，间隔 48-72 小时。";
      return planting === "地栽"
        ? `${low}，灌根 1:800-1:1200；地栽沿根区外缘少量施入。叶喷辅助时 1:1500，和灌根间隔 48 小时。`
        : `${low}，灌根 1:1200-1:1500；盆栽宁淡勿浓。叶喷辅助时 1:2000，和灌根间隔 48-72 小时。`;
    }

    function ratioNumber(ratio = "1份") {
      const match = String(ratio).match(/\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : 1;
    }

    function formatGram(value) {
      const rounded = Math.round(value * 10) / 10;
      return `${Number.isInteger(rounded) ? rounded : rounded.toFixed(1)} 克`;
    }

    function amountForComponent(component, recipe, planting) {
      const ratio = ratioNumber(component.ratio);
      const organicLike = component.role === "有机肥" && /养根|改土|有机/.test(recipe.name);
      if (organicLike) {
        return formatGram((planting === "地栽" ? 20 : 5) * ratio / 3);
      }
      return formatGram((planting === "地栽" ? 1 : 0.5) * ratio);
    }

    function dilutionForPlan(rule, growth, application, planting) {
      if (application.startsWith("叶喷优先")) return planting === "地栽" ? "1:1500" : "1:2000";
      if (rule.need.includes("有机肥")) return "不稀释";
      return planting === "地栽" ? "1:1000" : "1:1500";
    }

    function halfAmount(amount) {
      const match = String(amount || "").match(/\d+(?:\.\d+)?/);
      if (!match) return amount || "";
      return formatGram(Number(match[0]) / 2);
    }

    function rootPlanText(items, planting) {
      if (!items.length) return "灌根：当前库存缺少主要材料，先补齐配料。";
      const detail = items.map(item => `${item.name} ${item.amount}/${item.dilution || "不稀释"}`).join(" + ");
      const method = planting === "地栽"
        ? "沿根区外缘或滴水线少量慢浇，施后补清水；不要浇到主干根颈。"
        : "沿盆边慢浇到基质湿润，避免积水和浓肥贴根；盆土过干时先清水润盆再灌肥。";
      return `灌根：${detail}，${method}`;
    }

    function foliarPlanText(items, rule, planting) {
      const sprayable = items.filter(item => !/有机肥|骨粉|颗粒|菌/.test(item.name));
      if (!sprayable.length) {
        return "叶喷：本方案以有机/颗粒/菌剂为主，不建议叶喷；需要叶面补充时另用螯合微量元素或海藻氨基酸低浓度喷施。";
      }
      const dilution = planting === "地栽" ? "1:1500" : "1:2000";
      const detail = sprayable.map(item => `${item.name} ${halfAmount(item.amount)}/${dilution}`).join(" + ");
      return `叶喷：${detail}，傍晚喷叶背到湿而不滴，先小范围试喷；花期、高温正午、雨前不喷。`;
    }

    function rootFoliarIntervalText(growth, planting, temp = "") {
      const value = temp === "" || Number.isNaN(Number(temp)) ? "" : Number(temp);
      const cautious = growth.level === "feed" || planting === "盆栽" || (value !== "" && value >= 30);
      const gap = cautious ? 72 : 48;
      const order = /叶片发黄|不开花|落花落果/.test(growth.status || "")
        ? "先叶喷快速补微量元素，间隔后再低浓度灌根。"
        : "先灌根补根区营养，间隔后再叶喷作辅助。";
      return `叶喷/灌根间隔：不要同一天叠加；建议间隔 ${gap} 小时。${order}同一周最多 1 次灌根 + 1 次叶喷，弱苗只保留一种。`;
    }

    function purchaseAdviceText(missing, cropName) {
      if (!missing.length) return "购买建议：当前库存能覆盖本阶段关键需求，暂不必新增肥料。";
      const suggestions = {
        "蓝莓酸性肥": cropName === "蓝莓"
          ? "蓝莓酸性肥可买硫酸铵、酸性植物专用肥或蓝莓专用肥；避免长期使用硝态氮偏高的肥。"
          : "酸性专用肥可作为喜酸作物辅助，不是通用必买项。",
        "高钾肥": "高钾肥可买硫酸钾、磷酸二氢钾，或参考 15-5-30、15-10-30、13-5-40 这类高钾大量元素水溶肥。",
        "钙镁肥": cropName === "蓝莓"
          ? "钙镁肥可优先买螯合钙镁、钙镁硼锌铁中量元素肥；蓝莓慎用硝酸钙类，避免抬高根区盐分和硝态氮。"
          : "钙镁肥可买钙镁硼锌铁中量元素肥、螯合钙镁，或参考 15-5-15+Ca+Mg、17-3-17 Cal-Mag 型谱。",
        "磷钾肥": "磷钾肥可买磷酸二氢钾、脱脂骨粉，或参考 10-30-20、15-30-15 这类促根促花型水溶肥。",
        "平衡水溶肥": "平衡肥可买 20-20-20+TE、18-18-18+TE 或 20-10-20 这类通用平衡型水溶肥。",
        "微量元素": "微量元素可买螯合多微元素、硼锌铁锰组合、钙镁硼锌铁中量元素肥；花果期尤其注意硼、锌、铁。",
        "有机肥": "有机肥可买腐熟羊粪/鸡粪、有机颗粒肥、鱼蛋白、海藻精、矿源黄腐酸钾或腐殖酸类产品。"
      };
      return `购买建议：${missing.map(role => suggestions[role] || `${role} 可买对应专用肥，优先选择标注清晰、含量明确的产品。`).join(" ")}`;
    }

    function baseFertilizerGuidance(rule, growth, planting, cropName) {
      const organicStage = rule.need.includes("有机肥") || /休眠|养根|采后|改土|基肥|备土/.test(rule.stage);
      if (growth.level === "skip") {
        return "底肥/追肥指导：当前先不埋底肥、不追速效肥；先处理病虫害、烂根、积水或药害风险，恢复后再低量试施。";
      }
      if (!organicStage) {
        return "底肥/追肥指导：本阶段不建议临时重埋底肥，优先用低浓度灌根或叶喷微调；若刚换盆/定植，可只混少量缓释肥或腐熟有机质，避免烧根。";
      }
      if (planting === "地栽") {
        return cropName === "蓝莓"
          ? "底肥/浅埋指导：蓝莓地栽以酸性有机质、松针/树皮、腐熟有机肥少量改土为主，浅混在根区外围，避免石灰、草木灰和高盐底肥。"
          : "底肥/浅埋指导：地栽可在滴水线外缘浅沟施腐熟有机肥或缓释肥，覆土后浇透；不要贴主根，不要一次大量堆肥。";
      }
      return cropName === "蓝莓"
        ? "底肥/浅埋指导：蓝莓盆栽只建议少量酸性有机质或蓝莓专用缓释肥拌在盆边表层，宁少勿多，避免高盐颗粒肥贴根。"
        : "底肥/浅埋指导：盆栽若基质已肥沃，本轮不必再埋底肥；需要补底肥时只在盆边浅埋少量腐熟有机肥或缓释肥，再浇透观察。";
    }

    function timingGuidance(rule, growth, cropName) {
      const lastFeed = latest(records.filter(record => record.crop === cropName), "施肥");
      const feedDays = daysBetween(lastFeed?.date);
      const interval = safeFertilizerInterval(rule, growth, els.planting.value || "盆栽", els.temperature.value);
      if (growth.level === "skip") return "时机判断：当前状态不适合施肥。";
      if (feedDays !== Infinity && feedDays < interval) {
        return `时机判断：距离上次施肥 ${feedDays} 天，少于本阶段缩短后的建议间隔 ${interval} 天，本轮可先观察；确有缺素信号时只做极低浓度叶喷，和下次灌根至少间隔 48-72 小时。`;
      }
      if (feedDays === Infinity) return "时机判断：没有历史施肥记录，可从推荐量的半量开始试施。";
      return `时机判断：距离上次施肥 ${feedDays} 天，已达到缩短后的 ${interval} 天窗口，可按低浓度方案执行；灌根和叶喷分开安排。`;
    }

    function currentRecipeContext() {
      const rule = ruleForMonth(selectedCrop, currentMonth());
      const growth = analyzeGrowthStatus(els.growth.value || "正常", els.note.value || "");
      growth.status = els.growth.value || "正常";
      const cropRecords = records.filter(record => record.crop === selectedCrop);
      const feed = latest(cropRecords, "施肥");
      const water = latest(cropRecords, "浇水");
      const available = matchedFertilizer(rule);
      const planting = els.planting.value || "盆栽";
      const temp = els.temperature.value;
      const interval = safeFertilizerInterval(rule, growth, planting, temp);
      const decision = fertilizerDecision(
        cropMeta(selectedCrop),
        rule,
        daysBetween(feed?.date),
        daysBetween(water?.date),
        planting,
        available,
        growth,
        interval
      );
      return { rule, growth, planting, decision, interval };
    }

    function actionGuidanceForDecision(context) {
      const { rule, growth, planting, decision } = context;
      const stockAnalysis = analyzeFertilizerStockForRule(rule);
      const habit = cropHabitProfiles[selectedCrop] || "按当前月份、生长状态和库存肥料做低浓度、少量多次的管理。";
      const purchaseAdvice = purchaseAdviceText(stockAnalysis.missing, selectedCrop);
      const baseAdvice = baseFertilizerGuidance(rule, growth, planting, selectedCrop);
      const timingAdvice = timingGuidance(rule, growth, selectedCrop);
      const nextAction = decision.type === "wait"
        ? "当前适合：先观察、补清水、检查根区湿度或补齐库存，不启用一键配肥。"
        : "当前适合：不施速效肥，先做养护、清园、控水、病虫害处理或少量有机质改土。";
      return `${selectedCrop}${planting}当前不生成一键配料。${nextAction} 原因：${decision.label}，${decision.text} 习性需求：${habit} 当前阶段：${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}；植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice}`;
    }

    function renderRecipeGuidance(text = "") {
      lastRecipeGuidance = text;
      if (!text) {
        els.recipeGuidance.innerHTML = `<div class="empty">选择一键配料方案后，这里会显示购买建议、底肥指导、灌根和叶喷方案。</div>`;
        return;
      }
      const parts = String(text)
        .split(/(?<=。)/)
        .map(item => item.trim())
        .filter(Boolean);
      els.recipeGuidance.innerHTML = parts
        .map(part => `<p>${escapeHtml(part)}</p>`)
        .join("");
    }

    function recipePlanOptions() {
      if (els.type.value !== "施肥") return [];
      const context = currentRecipeContext();
      const { rule, growth, planting, decision } = context;
      if (!decision.recipe) return [];
      const application = applicationAdvice(rule, growth);
      const stockAnalysis = analyzeFertilizerStockForRule(rule);
      const habit = cropHabitProfiles[selectedCrop] || "按当前月份、生长状态和库存肥料做低浓度、少量多次的配肥。";
      const purchaseAdvice = purchaseAdviceText(stockAnalysis.missing, selectedCrop);
      const baseAdvice = baseFertilizerGuidance(rule, growth, planting, selectedCrop);
      const timingAdvice = timingGuidance(rule, growth, selectedCrop);
      const plans = recipesForRule(rule, growth).map(recipe => {
        const components = recipeComponents(recipe);
        const parts = components.map(component => component.name);
        const ratios = components.map(component => `${component.name}${component.ratio ? ` ${component.ratio}` : ""}`);
        const profile = profileForRule(rule, growth);
        const dose = doseForPlan(rule, growth, application, planting);
        const dilution = dilutionForPlan(rule, growth, application, planting);
        const items = components.map(component => ({
          name: component.name,
          amount: amountForComponent(component, recipe, planting),
          dilution
        }));
        const rootPlan = rootPlanText(items, planting);
        const foliarPlan = foliarPlanText(items, rule, planting);
        const intervalPlan = rootFoliarIntervalText(growth, planting, els.temperature.value);
        return {
          name: recipe.name,
          planting,
          fertilizer: parts.join("、"),
          dilution,
          items,
          note: `${selectedCrop}${planting}${recipe.name}：${ratios.length ? ratios.join(" + ") : "当前库存缺少主要材料"}。习性需求：${habit} 当前阶段：${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}；植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice} 品牌型谱：${profile} ${rootPlan} ${foliarPlan} ${intervalPlan} 阶段建议：${dose} 施用方式：${application}。注意：${recipe.caution}`
        };
      }).filter(plan => plan.fertilizer);
      if (plans.length) return plans;
      return [{
        name: "库存不足购买建议",
        planting,
        fertilizer: stockAnalysis.missing.length ? `建议购买：${stockAnalysis.missing.join("、")}` : "暂不施肥",
        dilution: "",
        items: [],
        note: `${selectedCrop}${planting}库存不足购买建议：当前 ${currentMonth()}月${rule.stage}，需求 ${rule.need.join("、")}。习性需求：${habit} 植株状态：${growth.status}，${growth.text} ${timingAdvice} 库存分析：${stockAnalysis.text}${stockAnalysis.missing.length ? `；缺口：${stockAnalysis.missing.join("、")}` : "；关键需求已有匹配"}。${purchaseAdvice} ${baseAdvice} 暂无可直接生成的配料，先补齐库存或改用低风险有机养护。`
      }];
    }

    function renderRecipeOptions() {
      const plans = recipePlanOptions();
      if (els.type.value === "施肥" && !plans.length) {
        const context = currentRecipeContext();
        els.recipe.innerHTML = `<option value="">${escapeHtml(context.decision.label)}：当前不生成配料</option>`;
        els.recipe.disabled = true;
        renderRecipeGuidance(actionGuidanceForDecision(context));
        return;
      }
      els.recipe.innerHTML = `<option value="">一键配料方案</option>` + plans
        .map((plan, index) => {
          const doseText = plan.items.length
            ? plan.items.map(item => `${item.name}${item.amount}/${item.dilution}`).join("；")
            : plan.fertilizer;
          return `<option value="${index}">${escapeHtml(plan.planting)}｜${escapeHtml(plan.name)}：${escapeHtml(doseText)}</option>`;
        })
        .join("");
      els.recipe.disabled = !plans.length || els.type.value !== "施肥";
      renderRecipeGuidance();
    }

    function applyRecipeOption() {
      const plans = recipePlanOptions();
      const plan = plans[Number(els.recipe.value)];
      if (!plan) {
        renderRecipeGuidance();
        return;
      }
      renderRecordFertilizerOptions(plan.items);
      renderRecipeGuidance(plan.note);
      toggleCustomInputs();
      renderPlans();
    }

    function toggleCustomInputs() {
      const isFeeding = els.type.value === "施肥";
      els.amountField.classList.toggle("custom-input", isFeeding);
      els.amountField.classList.toggle("show", !isFeeding);
      document.getElementById("fertilizerField").classList.toggle("custom-input", !isFeeding);
      document.getElementById("fertilizerField").classList.toggle("show", isFeeding);
      els.dilutionField.classList.toggle("show", false);
      els.customAmount.classList.toggle("show", !isFeeding && els.amount.value === "其他");
      els.customFertilizerRecord.classList.toggle("show", isFeeding);
      els.customDilution.classList.toggle("show", false);
    }

    function selectedAmountValue() {
      if (els.type.value === "施肥") {
        return selectedFertilizerItems()
          .map(item => `${item.name} ${item.amount}`)
          .join("；");
      }
      return els.amount.value === "其他" ? els.customAmount.value.trim() : els.amount.value;
    }

    function selectedFertilizerValue() {
      return selectedFertilizerItems().map(item => item.name).join("、");
    }

    function selectedDilutionValue() {
      if (els.type.value !== "施肥") return "";
      return selectedFertilizerItems()
        .map(item => `${item.name} ${item.dilution || "不稀释"}`)
        .join("；");
    }

    function selectedTemperatureValue() {
      return els.temperature.value === "" ? "" : Number(els.temperature.value);
    }

    function splitAmountAndDilution(amount, dilution) {
      if (dilution || !amount) return { amount: amount || "", dilution: dilution || "" };
      const match = amount.match(/(1:\d+)\s*稀释?/);
      if (!match) return { amount, dilution: "" };
      return { amount: "", dilution: match[1] };
    }

          deletedFertilizers.push(name);

        selectedFertilizersToDelete.delete(name);

    function deleteSelectedFertilizers() {

    function updateFertilizerDeleteStatus() {

    function deletePesticides(names) {
