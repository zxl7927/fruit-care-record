    function deletePesticides(names) {
      const uniqueNames = [...new Set(names)].filter(Boolean);
      if (!uniqueNames.length) return;
      pesticideStock = pesticideStock.filter(item => !uniqueNames.includes(item));
      customPesticides = customPesticides.filter(item => !uniqueNames.includes(item));
      uniqueNames.forEach(name => {
        if (basePesticides.some(item => item.name === name) && !deletedPesticides.includes(name)) {
          deletedPesticides.push(name);
        }
        selectedPesticidesToDelete.delete(name);
      });
      savePesticideStock();
      renderPesticideStock();
      renderPlans();
    }

    function deleteSelectedPesticides() {
      deletePesticides([...selectedPesticidesToDelete]);
    }

    function updatePesticideDeleteStatus() {
      if (!els.pesticideDeleteStatus || !els.deleteSelectedPesticides) return;
      const count = selectedPesticidesToDelete.size;
      els.pesticideDeleteStatus.textContent = `待删 ${count} 个药物`;
      els.deleteSelectedPesticides.disabled = count === 0;
    }

    function renderSummary() {
      if (!els.summary) return;
      const ranked = crops.map(crop => {
        const cropRecords = records.filter(record => record.crop === crop.name);
        const feed = latest(cropRecords, "施肥");
        const latestRecord = [...cropRecords].sort((a, b) => {
          const aTime = a.createdAt || new Date(a.date || 0).getTime();
          const bTime = b.createdAt || new Date(b.date || 0).getTime();
          return bTime - aTime;
        })[0];
        const score = Math.max(
          feed ? new Date(feed.date + "T00:00:00").getTime() : 0,
          latestRecord ? latestRecord.createdAt || new Date(latestRecord.date + "T00:00:00").getTime() : 0
        );
        return { crop, score };
      }).sort((a, b) => b.score - a.score || a.crop.name.localeCompare(b.crop.name, "zh-Hans"));

      const primary = ranked.slice(0, 4);
      const secondary = ranked.slice(4);

      const cardHtml = ({ crop }) => {
        const cropRecords = records.filter(record => record.crop === crop.name);
        const water = latest(cropRecords, "浇水");
        const feed = latest(cropRecords, "施肥");
        return `
          <article class="panel crop-card" style="--crop:${crop.color}">
            <h2>${crop.name}</h2>
            <div class="stat"><span>最近浇水</span><strong>${daysSince(water?.date)}</strong></div>
            <div class="stat"><span>最近施肥</span><strong>${daysSince(feed?.date)}</strong></div>
            <div class="stat"><span>累计记录</span><strong>${cropRecords.length} 条</strong></div>
          </article>
        `;
      };

      els.summary.innerHTML = `
        <div class="summary-wrap">
          <div class="summary">${primary.map(cardHtml).join("")}</div>
          ${secondary.length ? `
            <details class="compact-details summary-more">
              <summary>其他作物</summary>
              <div class="summary">${secondary.map(cardHtml).join("")}</div>
            </details>
          ` : ""}
        </div>
      `;
    }

    function resetMaterialForm() {
      if (!els.materialForm) return;
      els.materialForm.reset();
      els.materialId.value = "";
      els.materialKind.value = els.materialKindFilter.value || "肥料";
      els.materialStatus.value = "有效";
      els.materialStock.value = "1";
      els.materialUnit.value = "件";
    }

    function materialKindClass(status) {
      if (status === "过期") return "expired";
      if (status === "已用完") return "used";
      return "";
    }

    function renderMaterials() {
      if (!els.materialList) return;
      syncStockArraysFromMaterials();
      const kind = els.materialKindFilter.value || "肥料";
      const statusFilter = els.materialStatusFilter.value || "全部";
      const visible = (appData.materials || [])
        .map(normalizeMaterial)
        .filter(item => item.kind === kind && item.status !== "已删除")
        .filter(item => statusFilter === "全部" || materialDisplayStatus(item) === statusFilter)
        .sort((a, b) => materialDisplayStatus(a).localeCompare(materialDisplayStatus(b), "zh-Hans") || a.name.localeCompare(b.name, "zh-Hans"));
      const expiring = (appData.materials || [])
        .filter(item => item.status !== "已删除" && materialDisplayStatus(item) === "有效")
        .map(item => ({ item, days: daysUntilDate(item.expireDate) }))
        .filter(entry => entry.days >= 0 && entry.days <= 30)
        .sort((a, b) => a.days - b.days);
      els.materialExpiryAlert.innerHTML = expiring.length
        ? expiring.map(({ item, days }) => `<p><strong>即将过期：</strong>${escapeHtml(item.name)} ${days === 0 ? "今天到期" : `${days} 天后到期`}（${escapeHtml(item.expireDate)}）</p>`).join("")
        : `<div class="empty">暂无 30 天内即将过期的农资。</div>`;
      els.materialList.innerHTML = visible.map(item => {
        const status = materialDisplayStatus(item);
        const expireDays = daysUntilDate(item.expireDate);
        const expireText = item.expireDate
          ? status === "过期"
            ? `已过期 ${Math.abs(expireDays)} 天`
            : expireDays <= 30 && expireDays >= 0
              ? `${expireDays} 天后到期`
              : item.expireDate
          : "未填写";
        return `
          <article class="material-card ${materialKindClass(status)}">
            <div class="material-head">
              <strong>${escapeHtml(item.name)}</strong>
              <span class="tag" style="--crop:${status === "有效" ? "#35c676" : status === "过期" ? "#d95757" : "#9aa3a0"}">${escapeHtml(status)}</span>
            </div>
            <div class="material-meta">
              <span>类型：${escapeHtml(item.kind)}</span>
              <span>库存：${escapeHtml(item.stock)} ${escapeHtml(item.unit || "件")}</span>
              <span>购买：${escapeHtml(item.buyDate || "未填写")}</span>
              <span>有效期：${escapeHtml(expireText)}</span>
            </div>
            ${item.note ? `<div class="record-note">${escapeHtml(item.note)}</div>` : ""}
            <div class="material-actions">
              <button class="btn secondary" type="button" data-edit-material="${escapeHtml(item.id)}">编辑</button>
              <button class="btn secondary danger" type="button" data-delete-material="${escapeHtml(item.id)}">删除</button>
            </div>
          </article>
        `;
      }).join("") || `<div class="empty">暂无${escapeHtml(kind)}农资。</div>`;
      els.materialList.querySelectorAll("[data-edit-material]").forEach(button => {
        button.addEventListener("click", () => editMaterial(button.dataset.editMaterial));
      });
      els.materialList.querySelectorAll("[data-delete-material]").forEach(button => {
        button.addEventListener("click", () => deleteMaterial(button.dataset.deleteMaterial));
      });
    }

    function editMaterial(id) {
      const item = appData.materials.find(material => material.id === id);
      if (!item) return;
      els.materialId.value = item.id;
      els.materialName.value = item.name || "";
      els.materialKind.value = item.kind || "肥料";
      els.materialStock.value = Number(item.stock) || 0;
      els.materialUnit.value = item.unit || "件";
      els.materialBuyDate.value = item.buyDate || "";
      els.materialExpireDate.value = item.expireDate || "";
      els.materialStatus.value = materialDisplayStatus(item);
      els.materialNote.value = item.note || "";
      switchPage("mine");
    }

    function deleteMaterial(id) {
      const item = appData.materials.find(material => material.id === id);
      if (!item) return;
      if (!confirm(`删除农资「${item.name}」？`)) return;
      if ((item.kind === "肥料" && baseFertilizers.includes(item.name)) || (item.kind === "药剂" && basePesticides.some(base => base.name === item.name))) {
        item.status = "已删除";
        item.stock = 0;
      } else {
        appData.materials = appData.materials.filter(material => material.id !== id);
      }
      syncStockArraysFromMaterials();
      saveData();
      resetMaterialForm();
      renderAll();
      renderFertilizerStock();
      renderPesticideStock();
    }

    function plantAgeText(plant) {
      if (!plant?.createdAt) return "第1天";
      const date = String(plant.createdAt).slice(0, 10);
      const days = daysBetween(date);
      return `第${Number.isFinite(days) ? days + 1 : 1}天`;
    }

    function latestPlantRecord(plantId) {
      return latest(records.filter(record => record.plantId === plantId), record => true);
    }

    function plantCardHtml(plant) {
      const crop = cropMeta(plant.category || plant.name);
      const latestRecord = latestPlantRecord(plant.id);
      const photoStyle = plant.photo ? `background-image:url('${escapeHtml(plant.photo)}')` : "";
      return `
        <button class="plant-card" type="button" data-plant-detail="${escapeHtml(plant.id)}" style="--crop:${crop.color}">
          <div class="plant-photo" style="${photoStyle}">
            <span class="health-pill">${escapeHtml(plant.health || "健康")}</span>
            <span class="day-pill">${escapeHtml(plantAgeText(plant))}</span>
          </div>
          <div class="plant-card-body">
            <strong>${escapeHtml(plant.name)}</strong>
            <span>最近养护：${latestRecord?.date ? escapeHtml(latestRecord.date) : "暂无记录"}</span>
          </div>
        </button>
      `;
    }

    function renderHome() {
      if (!els.plantGrid) return;
      syncDataFromGlobals();
      const plants = appData.plants.map(normalizePlant);
      const dueTasks = (appData.tasks || []).filter(task => task.enabled !== false && task.nextDate && task.nextDate <= today());
      els.plantCount.textContent = `${plants.length} 株`;
      els.todayTaskText.textContent = dueTasks.length
        ? `今天有 ${dueTasks.length} 个任务待处理`
        : "今天没有任务，好好休息吧~";
      els.plantGrid.innerHTML = plants.map(plantCardHtml).join("") || `<div class="empty">暂无植物。</div>`;
      els.plantGrid.querySelectorAll("[data-plant-detail]").forEach(button => {
        button.addEventListener("click", () => renderPlantDetail(button.dataset.plantDetail));
      });
    }

    function addDays(dateString, days) {
      const date = new Date((dateString || today()) + "T00:00:00");
      date.setDate(date.getDate() + Number(days || 0));
      return localDateString(date);
    }

    function localDateString(date) {
      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0")
      ].join("-");
    }

    function taskPlant(task) {
      return appData.plants.find(plant => plant.id === task.plantId) || appData.plants[0] || plantFromCrop(crops[0].name);
    }

    function taskTypeAllowed(task) {
      return !els.taskTypeFilter?.value || els.taskTypeFilter.value === "全部" || task.type === els.taskTypeFilter.value;
    }

    function renderTaskControls() {
      if (!els.taskType || !els.taskPlant || !els.taskTypeFilter) return;
      const currentPlant = els.taskPlant.value;
      const currentType = els.taskType.value;
      const currentFilter = els.taskTypeFilter.value || "全部";
      const plants = appData.plants.map(normalizePlant);
      els.taskPlant.innerHTML = plants.map(plant => `<option value="${escapeHtml(plant.id)}">${escapeHtml(plant.name)}</option>`).join("");
      els.taskType.innerHTML = taskTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");
      els.taskTypeFilter.innerHTML = `<option value="全部">全部类型</option>` + taskTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");
      els.taskPlant.value = plants.some(plant => plant.id === currentPlant) ? currentPlant : plants[0]?.id || "";
      els.taskType.value = taskTypes.includes(currentType) ? currentType : taskTypes[0];
      els.taskTypeFilter.value = ["全部", ...taskTypes].includes(currentFilter) ? currentFilter : "全部";
    }

    function taskCardHtml(task, done = false) {
      const plant = taskPlant(task);
      const crop = cropMeta(plant.category || plant.name);
      const cycleText = Number(task.cycleDays) > 0 ? `${task.cycleDays} 天循环` : "不循环";
      return `
        <article class="task-card ${done ? "done" : ""}" style="--crop:${crop.color}">
          <div class="task-card-head">
            <div class="task-card-title">
              <strong>${escapeHtml(plant.name)} · ${escapeHtml(task.type)}</strong>
              <span>${done ? "完成于" : "计划"}：${escapeHtml(done ? task.completedAt || task.nextDate : task.nextDate || today())}</span>
            </div>
            <span class="tag" style="--crop:${crop.color}">${escapeHtml(task.type)}</span>
          </div>

    function renderTasks() {
      if (!els.todayTaskList) return;
      renderTaskControls();
      const now = today();
      const tasks = (appData.tasks || []).filter(taskTypeAllowed);
      const active = tasks.filter(task => task.enabled !== false);
      const todayTasks = active.filter(task => (task.nextDate || now) <= now).sort((a, b) => (a.nextDate || "").localeCompare(b.nextDate || ""));
      const futureTasks = active.filter(task => (task.nextDate || now) > now).sort((a, b) => (a.nextDate || "").localeCompare(b.nextDate || ""));
      const doneTasks = tasks
        .filter(task => task.enabled === false)
        .sort((a, b) => (b.completedAt || b.nextDate || "").localeCompare(a.completedAt || a.nextDate || ""))
        .slice(0, 30);
      els.todayTaskList.innerHTML = todayTasks.map(task => taskCardHtml(task)).join("") || `<div class="empty">今天没有任务。</div>`;
      els.futureTaskList.innerHTML = futureTasks.map(task => taskCardHtml(task)).join("") || `<div class="empty">暂无未来任务。</div>`;
      els.doneTaskList.innerHTML = doneTasks.map(task => taskCardHtml(task, true)).join("") || `<div class="empty">暂无已完成任务。</div>`;
      [els.todayTaskList, els.futureTaskList, els.doneTaskList].forEach(list => {
        list.querySelectorAll("[data-complete-task]").forEach(button => {
          button.addEventListener("click", () => completeTask(button.dataset.completeTask));
        });
        list.querySelectorAll("[data-edit-task]").forEach(button => {
          button.addEventListener("click", () => editTask(button.dataset.editTask));
        });
      });
    }

      if (!els.taskForm) return;
      els.taskForm.reset();
      els.taskId.value = "";
      renderTaskControls();
      els.taskNextDate.value = today();
      els.taskCycle.value = "7";
      els.taskNote.value = "";
    }

    function editTask(id) {
      const task = appData.tasks.find(item => item.id === id);
      if (!task) return;
      renderTaskControls();
      els.taskId.value = task.id;
      els.taskPlant.value = task.plantId || appData.plants[0]?.id || "";
      els.taskType.value = task.type || "浇水";
      els.taskNextDate.value = task.nextDate || today();
      els.taskCycle.value = Number(task.cycleDays) || 0;
      els.taskNote.value = task.note || "";
      switchPage("tasks");

    function completeTask(id) {
      const task = appData.tasks.find(item => item.id === id);
      if (!task || task.enabled === false) return;
      task.enabled = false;
      task.completedAt = today();
      const cycleDays = Number(task.cycleDays) || 0;
      if (cycleDays > 0) {
        appData.tasks.push({
          id: makeId("task"),
          plantId: task.plantId,
          type: task.type,
          nextDate: addDays(today(), cycleDays),
          cycleDays,
          enabled: true,
          completedAt: "",
          note: task.note || ""
        });
      }
      saveData();
      renderAll();
    }

    function createPlantRecord(plant, type, extra = {}) {
      const payload = normalizeRecord({
        id: crypto.randomUUID(),
        plantId: plant.id,
        crop: plant.category || plant.name,
        variety: plant.variety || "",
        planting: extra.planting || "盆栽",
        date: today(),
        type,
        amount: extra.amount || "",
        dilution: extra.dilution || "",
        fertilizer: extra.fertilizer || "",
        fertilizerItems: extra.fertilizerItems || [],
        growth: extra.growth || "正常",
        pestDiagnosis: extra.pestDiagnosis,
        temperature: extra.temperature ?? "",
        note: extra.note || "",
        photo: extra.photo || "",
        createdAt: Date.now()
      }, new Map(appData.plants.map(item => [item.id, item])));
      records.push(payload);
      saveRecords();
      renderAll();
      renderPlantDetail(plant.id);
    }

    function renderCalendar() {
      if (!els.calendarGrid) return;
      const [year, month] = calendarCursor.split("-").map(Number);
      const first = new Date(year, month - 1, 1);
      const start = new Date(first);
      const mondayOffset = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - mondayOffset);
      const monthText = `${year}-${String(month).padStart(2, "0")}`;
      els.calendarTitle.textContent = `${monthText} 日历`;
      const days = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const iso = localDateString(date);
        const dayRecords = records.filter(record => record.date === iso);
        const dayTasks = (appData.tasks || []).filter(task => task.enabled !== false && task.nextDate === iso);
        const inMonth = date.getMonth() === month - 1;
        return `
          <button class="calendar-day ${inMonth ? "" : "muted"} ${iso === today() ? "today" : ""} ${iso === selectedCalendarDate ? "selected" : ""}" type="button" data-calendar-date="${iso}">
            <span>${date.getDate()}</span>
            <span class="calendar-dots">
              ${dayRecords.length ? `<i class="calendar-dot record" title="有记录"></i>` : ""}
              ${dayTasks.length ? `<i class="calendar-dot task" title="有任务"></i>` : ""}
            </span>
          </button>
        `;
      });
      els.calendarGrid.innerHTML = days.join("");
      els.calendarGrid.querySelectorAll("[data-calendar-date]").forEach(button => {

          selectedCalendarDate = button.dataset.calendarDate;

    function shiftCalendarMonth(delta) {
      const [year, month] = calendarCursor.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      calendarCursor = localDateString(date).slice(0, 7);
      selectedCalendarDate = `${calendarCursor}-01`;
      renderCalendar();

    function ruleForMonth(cropName, month) {
      return annualPlans[cropName].find(rule => rule.months.includes(month));
    }

    function matchedFertilizer(rule) {
      const stock = fertilizerStock.length ? fertilizerStock : usedFertilizersFromRecords();
      const direct = rule.need.find(need => {
        const candidates = fertilizerGroups[need] || [need];
        return stock.some(item => candidates.some(candidate => item.includes(candidate) || candidate.includes(item)));
      });
      if (direct) {
        const candidates = fertilizerGroups[direct] || [direct];
        return stock.find(item => candidates.some(candidate => item.includes(candidate) || candidate.includes(item)));
      }
      return "";
    }

    function stockMatchForRole(role, prefer = []) {
      const stock = fertilizerStock.length ? fertilizerStock : usedFertilizersFromRecords();
      const candidates = [...prefer, ...(fertilizerGroups[role] || [role])];
      return stock.find(item => candidates.some(candidate => item.includes(candidate) || candidate.includes(item))) || "";
    }

    function stockCoversRole(stock, role) {
      const candidates = fertilizerGroups[role] || [role];
      return stock.some(item => candidates.some(candidate => item.includes(candidate) || candidate.includes(item)));
    }

    function evidenceRequirementsForStock(cropName, rule) {
      const stageText = `${rule.stage} ${rule.need.join("、")}`;
      const requirements = [];

      if (/开花|坐果|膨果|采收|花果|果/.test(stageText)) {
        requirements.push(
          { role: "高钾肥", reason: "欧亚果树和茄果/瓜类研究普遍把钾列为坐果、膨果、糖酸和果实品质的关键元素。" },
          { role: "钙镁肥", reason: "钙关系到番茄脐腐、果实硬度和细胞壁稳定，镁关系到光合与糖分积累；花果期库存最好覆盖。" },
          { role: "微量元素", reason: "硼、锌、铁等微量元素常与花粉活力、坐果和叶片功能相关，叶喷低浓度更稳。" }
        );
      }

      if (/萌芽|展叶|营养生长|抽蔓|缓苗/.test(stageText)) {
        requirements.push(
          { role: "平衡水溶肥", reason: "营养生长期需要氮磷钾均衡，过早偏高钾会削弱新梢和根系恢复。" },
          { role: "有机肥", reason: "有机质、腐殖酸、海藻/鱼蛋白类材料有助于根区缓冲和微生物活性。" }
        );
      }

      if (/休眠|采后|养根|改土|基肥|备土/.test(stageText)) {
        requirements.push(
          { role: "有机肥", reason: "采后和休眠前后更适合改土、补有机质和缓释养根，而不是追高盐速效肥。" }
        );
      }

      if (cropName === "蓝莓") {
        requirements.push(
          { role: "蓝莓酸性肥", reason: "蓝莓研究强调酸性根区、铵态氮偏好和盐分控制，酸性肥/硫酸铵类库存应单独校验。" },
          { role: "有机肥", reason: "蓝莓根系细、依赖酸性有机质和稳定水分，松树皮/泥炭/腐熟有机质比重肥更安全。" }
        );
      }

      if (cropName === "葡萄") {
        requirements.push(
          { role: "高钾肥", reason: "葡萄浆果发育和品质与钾营养密切相关，但要避免钾过量拮抗镁。" },
          { role: "钙镁肥", reason: "镁参与叶绿素和糖分运输，葡萄花果期库存应有镁源作为校正。" }
        );
      }

      if (cropName === "番茄") {
        requirements.push(
          { role: "钙镁肥", reason: "番茄果实品质问题中，钙不足和水分波动常与脐腐相关，钾钙平衡要同时看。" },
          { role: "高钾肥", reason: "番茄进入花果期后，钾对糖酸、着色和产量更关键。" }
        );
      }

      if (cropName === "西瓜") {
        requirements.push(
          { role: "高钾肥", reason: "瓜类膨果和糖分积累阶段对钾需求高，库存缺钾时不建议只用平衡肥硬顶。" },
          { role: "钙镁肥", reason: "钙镁库存可帮助维持叶片光合、果实硬度和逆境稳定性。" }
        );
      }

      return requirements.filter((item, index, list) =>
        list.findIndex(other => other.role === item.role) === index
      );
    }

    function evidenceRiskNotes(stock, cropName) {
      const notes = [];
      const joined = stock.join("、");
      if (cropName === "蓝莓" && /硝酸钙|硝态氮|草木灰|石灰|碱/.test(joined)) {
        notes.push("蓝莓库存风险：硝酸钙、草木灰、石灰或偏碱材料可能抬高根区 pH/盐分，应避免作为常规主肥。");
      }
      if (/尿素|氮肥/.test(joined) && !/高钾|硫酸钾|磷酸二氢钾|钙镁|微量/.test(joined)) {
        notes.push("结构风险：库存偏氮，花果期容易徒长或坐果品质不稳，需配钾、钙镁和微量元素。");
      }
      if (/高钾|硫酸钾|磷酸二氢钾/.test(joined) && !/钙镁|镁|中量/.test(joined)) {
        notes.push("拮抗风险：长期只补高钾可能影响钙镁吸收，花果期建议补充钙镁源。");
      }
      return notes;
    }

    function analyzeFertilizerStockForRule(rule) {
      const stock = fertilizerStock.length ? fertilizerStock : usedFertilizersFromRecords();
      const roles = [...new Set([...rule.need, "有机肥", "平衡水溶肥", "高钾肥", "磷钾肥", "钙镁肥", "微量元素"])];
      const matched = roles.map(role => ({ role, name: stockMatchForRole(role) })).filter(item => item.name);
      const evidenceChecks = evidenceRequirementsForStock(selectedCrop, rule);
      const evidenceMissing = evidenceChecks.filter(item => !stockCoversRole(stock, item.role));
      const missing = [...new Set([
        ...rule.need.filter(role => !matched.some(item => item.role === role)),
        ...evidenceMissing.map(item => item.role)
      ])];
      const evidenceCovered = evidenceChecks.filter(item => stockCoversRole(stock, item.role)).map(item => item.role);
      const evidenceText = evidenceChecks.length
        ? `论文校验：已覆盖 ${evidenceCovered.join("、") || "无"}；需补/关注 ${evidenceMissing.map(item => `${item.role}（${item.reason}）`).join("；") || "暂无额外缺口"}`
        : "论文校验：本阶段按常规库存覆盖即可，重点避免过量和高盐。";
      const riskText = evidenceRiskNotes(stock, selectedCrop).join(" ");
      return {
        stock,
        matched,
        missing,
        text: matched.length
          ? `${matched.map(item => `${item.role}→${item.name}`).join("；")}。${evidenceText}${riskText ? `。${riskText}` : ""}`
          : `当前没有可用库存，先在肥料库存中勾选或添加肥料。${evidenceText}`
      };
    }

    function recipesForRule(rule, growth = { level: "normal", status: "正常" }) {
      const matches = recipeLibrary
        .map(recipe => {
          const score = recipePriority(recipe, rule, growth);
          return { recipe, score };
        })
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .map(item => item.recipe);

      if (matches.length) return matches.slice(0, 3);
      return recipeLibrary.filter(recipe => recipe.tags.includes("有机肥")).slice(0, 1);
    }

    function renderRecipe(recipe, application, rule, growth) {
      const chosen = recipeComponents(recipe);
      const chosenNames = new Set(chosen.map(component => component.name));
      const parts = chosen.map(component => `${component.name} ${component.ratio}`);
      const missing = recipe.components
        .filter(component => {
          const match = stockMatchForRole(component.role, component.prefer);
          return !match || chosenNames.has(match) && chosen.filter(item => item.name === match).length > 1;
        })
        .map(component => component.role);
      const missingText = missing.length ? `缺口：${[...new Set(missing)].join("、")}` : "材料齐全";
      const profile = profileForRule(rule, growth);
      const dose = doseForPlan(rule, growth, application);
      const items = chosen.map(component => ({
        name: component.name,
        amount: amountForComponent(component, recipe, els.planting.value || "盆栽"),
        dilution: dilutionForPlan(rule, growth, application, els.planting.value || "盆栽")
      }));
      const rootPlan = rootPlanText(items, els.planting.value || "盆栽");
      const foliarPlan = foliarPlanText(items, rule, els.planting.value || "盆栽");
      const intervalPlan = rootFoliarIntervalText(growth, els.planting.value || "盆栽", els.temperature.value);
      return `
        <div class="recipe">
          <p class="recipe-title">${escapeHtml(recipe.name)}</p>
          <p class="recipe-detail"><strong>配比：</strong>${escapeHtml(parts.join(" + ") || "当前库存缺主要材料")}</p>
          <p class="recipe-detail"><strong>参考：</strong>${escapeHtml(profile)}</p>
          <p class="recipe-detail"><strong>${escapeHtml(application)}。</strong>${escapeHtml(missingText)}，${escapeHtml(dose)}</p>
          <p class="recipe-detail"><strong>灌根：</strong>${escapeHtml(rootPlan.replace(/^灌根：/, ""))}</p>
          <p class="recipe-detail"><strong>叶喷：</strong>${escapeHtml(foliarPlan.replace(/^叶喷：/, ""))}</p>
          <p class="recipe-detail"><strong>间隔：</strong>${escapeHtml(intervalPlan.replace(/^叶喷\/灌根间隔：/, ""))}</p>
        </div>
      `;
    }

    function currentPestDiagnosis() {
      if (els.growth.value !== "病虫害疑似") return null;
      return {
        problem: els.pestProblem.value,
        part: els.pestPart.value,
        severity: els.pestSeverity.value,
        action: els.pestAction.value
      };
    }

    function pestDiagnosisText(diagnosis) {
      if (!diagnosis) return "";
      return [diagnosis.problem, diagnosis.part, diagnosis.severity, diagnosis.action]
        .filter(Boolean)
        .join(" / ");
    }

    function recommendedPestAction(problem, part, severity) {
      const text = `${problem || ""} ${part || ""} ${severity || ""}`;
      if (/未确认/.test(problem || "")) return "隔离观察";
      if (/根腐|烂根|根颈|土表/.test(text)) return severity === "轻微" ? "隔离观察" : "灌根";
      if (severity === "严重") return "修剪清园";
      if (/介壳|蚧壳/.test(text)) return severity === "轻微" ? "物理清除" : "叶喷";
      if (/青虫|夜蛾|卷叶蛾|虫|咬食/.test(text)) return severity === "轻微" ? "物理清除" : "叶喷";
      if (/蚜虫|粉虱|蓟马|红蜘蛛|螨|叶背|嫩梢|叶片|花\/果/.test(text)) return "叶喷";
      if (/白粉|霜霉|炭疽|叶斑|病斑|霉/.test(text)) return severity === "轻微" ? "修剪清园" : "叶喷";
      if (/全株/.test(text)) return severity === "轻微" ? "隔离观察" : "修剪清园";
      return "隔离观察";
    }

    function syncPestAction() {
      if (els.growth.value !== "病虫害疑似") return;
      els.pestAction.value = recommendedPestAction(els.pestProblem.value, els.pestPart.value, els.pestSeverity.value);
    }

    function togglePestPanel(clear = true) {
      const active = els.growth.value === "病虫害疑似";
      els.pestPanel.classList.toggle("active", active);
      if (!active && clear) {
        els.pestProblem.value = "未确认";
        els.pestPart.value = "叶背/嫩梢";
        els.pestSeverity.value = "轻微";
        els.pestAction.value = "隔离观察";
      } else if (active) {
        syncPestAction();
      }
    }

    function setPestDiagnosis(diagnosis) {
      const data = diagnosis || {};
      els.pestProblem.value = data.problem || "未确认";
      els.pestPart.value = data.part || "叶背/嫩梢";
      els.pestSeverity.value = data.severity || "轻微";
      els.pestAction.value = data.action || "隔离观察";
      togglePestPanel(false);
    }

    function analyzeGrowthStatus(status, note) {
      const text = `${status || ""} ${note || ""}`;
      if (/病|虫|斑|霉|烂|疑似/.test(text)) {
        return { level: "skip", text: "疑似病虫害或病斑，先隔离观察、处理病虫害，不建议马上施肥。" };
      }
      if (/徒长|旺长|枝叶太旺/.test(text)) {
        return { level: "wait", text: "有徒长倾向，减少氮肥，转向控水、修剪和少量磷钾。" };
      }
      if (/黄|弱|小|慢|不开花|落花|落果|焦/.test(text)) {
        return { level: "feed", text: "有缺素或生殖生长压力信号，可按阶段低量补肥。" };
      }
      return { level: "normal", text: "生长情况正常，按间隔和阶段判断即可。" };
    }

    function applicationAdvice(rule, growth) {
      if (growth.level === "skip") return "不施肥";
      if (rule.need.includes("微量元素") || /叶片发黄|不开花|落花落果/.test(growth.status || "")) {
        return "叶喷优先，浓度取低值；高温、花开正盛时不要喷";
      }
      if (rule.need.includes("有机肥")) return "灌根或浅埋后浇水";
      return "灌根为主，叶喷只做低浓度辅助";
    }

    function temperatureAdvice(temp, cropName, stage) {
      if (temp === "" || Number.isNaN(Number(temp))) {
        return "未填写气温：按常规养护，修剪避开极端高温、低温和花果关键期。";
      }
      const value = Number(temp);
      if (value >= 35) return "高温：暂停重剪和施肥，遮阴通风，早晚少量补水，叶喷暂停。";
      if (value >= 30) return "偏热：只做摘老叶、病叶、残花等轻修剪；施肥用低浓度，避开中午。";
      if (value >= 18) return `${cropName}处于适宜操作温度，可做常规养护；修剪以通风、去弱枝和花后回剪为主。`;
      if (value >= 10) return "偏凉：少量修剪可以，施肥要保守，等连续回暖后再追速效肥。";
      if (value >= 3) return "低温：不建议施肥，修剪只做休眠期结构修剪或去病残枝。";
      return "接近霜冻：暂停浇大水、施肥和修剪，优先防寒保温。";
    }

    function varietyCareText(varieties) {
      return varieties.map(variety => varietyCare[variety]).filter(Boolean).join(" ");
    }

    function renderFormAdvice() {
      if (!els.formAdvice) return;
      const status = els.growth.value || "正常";
      const note = els.note.value || "";
      const rule = ruleForMonth(selectedCrop, currentMonth());
      const growth = analyzeGrowthStatus(status, note);
      growth.status = status;
      const care = varietyCareText(cropMeta(selectedCrop).varieties) || cropHabitProfiles[selectedCrop] || "保持水肥稳定，避免大水大肥。";
      const temp = els.temperature.value === "" ? "" : Number(els.temperature.value);
      const trim = temperatureAdvice(temp, selectedCrop, rule?.stage || "");
      const pestAdvice = status === "病虫害疑似"
        ? pestControlAdvice(growth, note, currentPestDiagnosis())
        : "";
      const show = status !== "正常" || note.trim() || els.temperature.value !== "";
      els.formAdvice.classList.toggle("show", show);
      if (!show) {
        els.formAdvice.innerHTML = "";
        return;
      }
      els.formAdvice.innerHTML = `
        <p><strong>生长分析：</strong>${escapeHtml(growth.text)}</p>
        <p><strong>养护建议：</strong>${escapeHtml(care)}</p>
        <p><strong>修剪建议：</strong>${escapeHtml(trim)}</p>
        ${pestAdvice ? `<p><strong>病虫害处理：</strong>${escapeHtml(pestAdvice)}</p>` : ""}
      `;
    }

    function nextFeedText(feed, interval) {
      if (!feed?.date) return "无施肥记录：可从本次少量试施开始。";
      const days = daysBetween(feed.date);
      const next = new Date(feed.date + "T00:00:00");
      next.setDate(next.getDate() + interval);
      const nextDate = next.toISOString().slice(0, 10);
      if (days >= interval) return `安全间隔 ${interval} 天；上次 ${feed.date}，已间隔 ${days} 天，现在已到下一次窗口。`;
      return `安全间隔 ${interval} 天；上次 ${feed.date}，已间隔 ${days} 天，建议 ${nextDate} 后再评估施肥。`;
    }

    function safeFertilizerInterval(rule, growth, plantingText, temp = "") {
      const stageText = `${rule.stage} ${rule.need.join("、")}`;
      const value = temp === "" || Number.isNaN(Number(temp)) ? "" : Number(temp);
      const dormant = /休眠|入冬|秋冬|备土|改土|基肥/.test(stageText);
      const highHeat = value !== "" && value >= 30;
      const riskyGrowth = growth.level === "skip" || /长势弱|叶缘焦枯/.test(growth.status || "");

      let minimum = 6;
      if (/连续|采收|花果期/.test(stageText)) minimum = 4;
      if (/开花|坐果|膨果|现蕾|花苞|孕蕾/.test(stageText)) minimum = 5;
      if (/萌芽|展叶|伸蔓|抽枝|缓苗/.test(stageText)) minimum = 6;
      if (/采后|恢复|养枝/.test(stageText)) minimum = 8;
      if (/高温|夏季/.test(stageText)) minimum = 10;
      if (dormant) minimum = 18;

      if (dormant) {
        return Math.max(minimum, Math.round(rule.interval * 0.6));
      }

      if (riskyGrowth || highHeat) {
        return Math.max(minimum, Math.round(rule.interval * 0.75));
      }

      const factor = plantingText === "地栽" ? 0.55 : 0.62;
      const stageBonus = /连续|采收|膨果|坐果|花果期/.test(stageText) ? 3 : 2;
      return Math.max(minimum, Math.round(rule.interval * factor) - stageBonus);
    }

    function fertilizerDecision(crop, rule, feedDays, waterDays, plantingText, available, growth, interval = rule.interval) {
      const dormant = ["休眠期", "休眠修剪", "秋冬养根", "采后改土"].includes(rule.stage);
      const recentFeed = feedDays !== Infinity && feedDays < interval;
      const dryFirst = waterDays === Infinity || waterDays > 5;
      const noFertilizer = !available && rule.need.some(need => need !== "有机肥");

      if (growth.level === "skip") {
        return {
          type: "skip",
          label: "不施肥",
          text: growth.text,
          recipe: false
        };
      }

      if (growth.level === "normal" && recentFeed) {
        return {
          type: "skip",
          label: "无需操作",
          text: `植株状态正常，且上次施肥距今 ${feedDays} 天，未到安全建议间隔 ${interval} 天。保持观察即可。`,
          recipe: false
        };
      }

      if (recentFeed) {
        return {
          type: "wait",
          label: "暂缓施肥",
          text: `上次施肥距今 ${feedDays} 天，少于安全建议间隔 ${interval} 天。先观察叶色、盆土和新梢，避免肥害。`,
          recipe: false
        };
      }

      if (dryFirst && !dormant) {
        return {
          type: "wait",
          label: "先浇水观察",
          text: waterDays === Infinity
            ? "还没有浇水记录。先补一次清水，等根区湿度稳定后再决定是否施肥。"
            : `距离上次浇水 ${waterDays} 天。先确认土壤湿度，干旱状态下不要直接上肥。`,
          recipe: false
        };
      }

      if (dormant) {
        return {
          type: "skip",
          label: "不施速效肥",
          text: plantingText === "地栽"
            ? "当前更适合清园、覆盖和少量有机质改土；速效水溶肥可以暂时不施。"
            : "当前以控水、保根和低盐环境为主，盆栽尤其不建议频繁追肥。",
          recipe: rule.need.includes("有机肥")
        };
      }

      if (noFertilizer) {
        return {
          type: "wait",
          label: "缺肥料，暂缓",
          text: `本阶段主要需要 ${rule.need.join("、")}，当前库存没有合适匹配。先不要乱配，补齐后再薄施。`,
          recipe: false
        };
      }

      return {
        type: "feed",
        label: "可以薄施",
        text: growth.level === "feed"
          ? `${growth.text}${plantingText === "盆栽" ? " 盆栽低浓度、小剂量。" : " 地栽沿根区外缘少量施入。"}`
          : (plantingText === "盆栽"
            ? "满足本阶段需求且间隔已到。盆栽建议低浓度、小剂量，宁淡勿浓。"
            : "满足本阶段需求且间隔已到。地栽可沿根区外缘少量施入，再配合浇水。"),
        recipe: true
      };
    }

    function usedFertilizersFromRecords() {
      return [...new Set(records.flatMap(record => {
        if (Array.isArray(record.fertilizerItems)) {
          return record.fertilizerItems.map(item => item.name).filter(Boolean);
        }
        return splitFertilizerNames(record.fertilizer);
      }))];
    }

    function pestControlAdvice(growth, noteText, diagnosis = null) {
      const text = `${growth.status || ""} ${growth.text || ""} ${noteText || ""} ${pestDiagnosisText(diagnosis)}`;
      const selectedProblem = diagnosis?.problem || "";
      const pestGroups = [
        { match: /红蜘蛛|叶螨|螨|锈壁虱/, label: "螨类", names: ["阿维菌素", "苦楝油"], method: "重点喷叶背和嫩梢，先用清水冲洗虫口，3-5天复查；连续高温干燥时加强通风增湿。" },
        { match: /蚜|粉虱|白粉虱|蓟马|介壳|蚧壳|木虱|刺吸/, label: "刺吸式害虫", names: ["螺虫乙酯", "吡虫啉", "啶虫脒", "苦楝油", "多杀霉素"], method: "剪除虫量高的嫩梢，叶背和新梢均匀喷雾；介壳虫先用棉签或软刷物理清除蜡壳。" },
        { match: /青虫|夜蛾|卷叶蛾|潜叶蛾|菜青虫|幼虫|虫洞|咬食|鳞翅/, label: "咬食性幼虫", names: ["甲维盐", "多杀霉素", "阿维菌素"], method: "傍晚巡查叶背和卷叶处，先摘除虫叶、卵块和幼虫；药液重点打到取食部位。" },
        { match: /白粉|霜霉|炭疽|叶斑|黑斑|褐斑|灰霉|霉|病斑|锈病|真菌/, label: "真菌性病害", names: ["代森锰锌", "苯醚甲环唑", "吡唑醚菌酯"], method: "先摘病叶、清理落叶并拉开通风；保护剂用于预防扩散，内吸/治疗性杀菌剂用于初发病斑。" },
        { match: /根腐|烂根|根颈|土表|积水/, label: "根腐/根颈问题", names: ["代森锰锌", "苯醚甲环唑"], method: "先停肥控水，检查根系和介质排水；剪除黑腐根，盆栽必要时换透气介质，灌根只做低浓度局部处理。" }
      ];
      const matched = pestGroups.find(group => group.match.test(selectedProblem)) || pestGroups.find(group => group.match.test(text));

      if (!matched && growth.level !== "skip") {
        return "未见明确病虫害信号；保持通风、清理病叶，发现虫害先拍照确认。";
      }

      const group = matched || {
        label: "病虫害疑似",
        names: ["苦楝油", "阿维菌素", "啶虫脒", "代森锰锌", "苯醚甲环唑"]
      };
      const inStock = group.names.filter(name => pesticideStock.includes(name));
      const missing = group.names.filter(name => !pesticideStock.includes(name)).slice(0, 3);
      const severity = diagnosis?.severity || "轻微";
      const part = diagnosis?.part || "叶背/嫩梢";
      const action = diagnosis?.action || "隔离观察";
      const severityAdvice = severity === "严重"
        ? "严重发生：立即隔离，剪除重病虫枝叶并装袋丢弃；7天左右复查，必要时轮换不同作用机制药剂，暂停施肥。"
        : severity === "中等"
          ? "中等发生：先清理病虫叶，再做针对性喷雾或灌根；5-7天复查扩散情况。"
          : "轻微发生：优先隔离、冲洗叶背、擦除虫体或摘除病叶；扩大时再上药。";
      const actionAdvice = action === "灌根"
        ? "灌根只适合根区/土传问题，叶面虫害仍需叶背喷雾；盆土过湿时先控水。"
        : action === "叶喷"
          ? `叶喷重点覆盖${part}，避开高温、强光、花期和授粉昆虫活动时段。`
          : action === "修剪清园"
            ? "修剪后工具消毒，病残体不要堆在盆边或土表。"
            : "先做隔离观察和物理清除，确认虫体或病斑扩散后再用药。";

      if (inStock.length) {
        const useList = inStock.map(name => {
          const meta = pesticideMeta(name);
          return `${name}（${meta.type}）`;
        }).join("、");
        const buyText = missing.length ? `；缺口可备：${missing.join("、")}` : "";
        return `${group.label}，部位：${part}，程度：${severity}。${severityAdvice} ${group.method} 可考虑：${useList}${buyText}。${actionAdvice} 按标签登记作物、稀释倍数和安全间隔使用，避免花期喷药并轮换不同作用机制。`;
      }

      return `${group.label}，部位：${part}，程度：${severity}。${severityAdvice} ${group.method} 库存未匹配到合适药物，建议补充：${missing.join("、")}。${actionAdvice} 用药前先确认虫/病种类，优先局部处理，严格按标签稀释和安全间隔执行。`;
    }

    function renderPlans() {
      const month = currentMonth();
      els.planGrid.innerHTML = [cropMeta(selectedCrop)].map(crop => {
        const rule = ruleForMonth(crop.name, month);
        const varieties = crop.varieties.join("、");
        const noteText = crop.varieties.map(variety => varietyNotes[variety]).filter(Boolean).join(" ");
        const plantingRecords = records.filter(record => record.crop === crop.name && record.planting);
        const plantingText = plantingRecords[0]?.planting || "盆栽/地栽";
        const plantingAdvice = plantingText === "地栽"
          ? "地栽以根区改土、深浇和少次稳施为主，颗粒肥沿滴水线外圈浅埋。"
          : plantingText === "盆栽"
            ? "盆栽肥量按地栽思路减半或更低，优先低浓度水溶肥，避免盐分累积。"
            : "盆栽按低浓度多次，地栽按根区范围少次稳施。";
        const cropRecords = records.filter(record => record.crop === crop.name);
        const feed = latest(cropRecords, "施肥");
        const water = latest(cropRecords, "浇水");
        const observation = latest(cropRecords.filter(record => record.growth || record.note || record.temperature !== undefined), record => true);
        const feedDays = daysBetween(feed?.date);
        const waterDays = daysBetween(water?.date);
        const available = matchedFertilizer(rule);
        const stockText = fertilizerStock.length ? fertilizerStock.join("、") : "未勾选肥料";
        const currentGrowth = crop.name === selectedCrop ? els.growth.value : observation?.growth || "正常";
        const currentNote = crop.name === selectedCrop ? els.note.value : observation?.note || "";
        const currentPest = crop.name === selectedCrop ? currentPestDiagnosis() : observation?.pestDiagnosis || null;
        const currentTemp = crop.name === selectedCrop && els.temperature.value !== "" ? Number(els.temperature.value) : observation?.temperature ?? "";
        const growth = analyzeGrowthStatus(currentGrowth || "正常", currentNote || "");
        growth.status = currentGrowth || "正常";
        const interval = safeFertilizerInterval(rule, growth, plantingText, currentTemp);
        const appAdvice = applicationAdvice(rule, growth);
        const decision = fertilizerDecision(crop, rule, feedDays, waterDays, plantingText, available, growth, interval);
        const fertilizerText = decision.type === "feed" || decision.recipe
          ? (available
            ? `优先用：${available}`
            : `库存未匹配到 ${rule.need.join("、")}，建议补齐其中一种，或先用有机肥低量过渡。`)
          : "本轮不施肥；先按上面的判断浇水、观察或补齐合适肥料。";
        const pestAdvice = pestControlAdvice(growth, currentNote, currentPest);
        const recipeHtml = decision.recipe
          ? recipesForRule(rule, growth).map(recipe => renderRecipe(recipe, appAdvice, rule, growth)).join("")
          : `<div class="recipe"><p class="recipe-title">本轮不配肥</p><p class="recipe-detail">${escapeHtml(decision.text)}</p></div>`;
        const timingText = feedDays === Infinity
          ? "还没有施肥记录，可按少量试施开始。"
          : feedDays < interval
            ? `距离上次施肥 ${feedDays} 天，建议再等 ${interval - feedDays} 天左右。`
            : `距离上次施肥 ${feedDays} 天，可以安排下一次薄施。`;
        return `
          <article class="plan-card" style="--crop:${crop.color}">
            <div class="plan-head">
              <h3>${crop.name}</h3>
              <span class="month-badge">${month}月 · ${rule.stage}</span>
            </div>
            <p class="plan-line"><span class="decision ${decision.type === "feed" ? "" : decision.type}">${escapeHtml(decision.label)}</span> ${escapeHtml(decision.text)}</p>
            <div class="brief-grid">
              <div class="brief-item"><strong>种植</strong>${escapeHtml(plantingText)} · ${escapeHtml(plantingAdvice)}</div>
              <div class="brief-item"><strong>肥料</strong>${escapeHtml(fertilizerText)}</div>
              <div class="brief-item"><strong>下次</strong>${escapeHtml(nextFeedText(feed, interval))}</div>
              <div class="brief-item full"><strong>病虫害</strong>${escapeHtml(pestAdvice)}</div>
            </div>
            <div class="recipe-list">${recipeHtml}</div>
            <details class="advice-details">
              <summary>养护 / 修剪 / 生长分析</summary>
              <p class="plan-line"><strong>生长：</strong>${escapeHtml(currentGrowth || "正常")}；${escapeHtml(growth.text)}</p>
              <p class="plan-line"><strong>养护：</strong>${escapeHtml(varietyCareText(crop.varieties))}</p>
              <p class="plan-line"><strong>修剪：</strong>${escapeHtml(temperatureAdvice(currentTemp, crop.name, rule.stage))}</p>
              <p class="plan-line"><strong>施用：</strong>${escapeHtml(appAdvice)}</p>
              <p class="plan-line"><strong>病虫害：</strong>${escapeHtml(pestAdvice)}</p>
            </details>
          </article>
        `;
      }).join("");
    }

    function latest(list, type) {
      return [...list]
        .filter(record => typeof type === "function" ? type(record) : record.type === type)
        .sort((a, b) => b.date.localeCompare(a.date))[0];
    }

    function getFilteredRecords() {
      const keyword = els.search.value.trim().toLowerCase();
      return [...records]
        .filter(record => els.cropFilter.value === "全部" || record.crop === els.cropFilter.value)
        .filter(record => els.typeFilter.value === "全部" || record.type === els.typeFilter.value)
        .filter(record => {
          const text = `${record.crop} ${record.variety || ""} ${record.planting || ""} ${record.type} ${record.amount} ${record.fertilizer} ${record.growth || ""} ${pestDiagnosisText(record.pestDiagnosis)} ${record.temperature || ""} ${record.note}`.toLowerCase();
          const textWithDilution = `${text} ${record.dilution || ""}`.toLowerCase();
          return !keyword || textWithDilution.includes(keyword);
        })
        .sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
    }

    function renderTable() {
      const visible = getFilteredRecords();
      const visibleIds = new Set(visible.map(record => record.id));
      selectedRecordIds = new Set([...selectedRecordIds].filter(id => visibleIds.has(id)));
      updateBulkStatus();
      if (!visible.length) {
        els.tableWrap.innerHTML = `<div class="empty">暂无记录。先在“新增”里添加一次浇水或施肥。</div>`;
        return;
      }
      const pageVisible = visible.slice(0, visibleRecordCount);
      const hasMore = visibleRecordCount < visible.length;

      els.tableWrap.innerHTML = `
        <div class="record-list">
          ${pageVisible.map(record => {
            const crop = cropMeta(record.crop);
            const tempText = record.temperature === "" || record.temperature === undefined ? "-" : `${escapeHtml(record.temperature)}°C`;
            return `
              <article class="record-card">
                <div class="record-card-head">
                  <label class="record-title">
                    <input class="row-check record-check" type="checkbox" value="${record.id}" ${selectedRecordIds.has(record.id) ? "checked" : ""}>
                    <span class="tag" style="--crop:${crop.color}">${escapeHtml(record.crop)}</span>
                    <span class="type ${record.type === "施肥" ? "feed" : ""}">${escapeHtml(record.type)}</span>
                  </label>
                  <span class="record-date">${escapeHtml(record.date)}</span>
                </div>
                <div class="record-meta">
                  <span><strong>种植</strong> ${escapeHtml(record.planting || "盆栽")}</span>
                  <span><strong>用量</strong> ${escapeHtml(record.amount || "-")}</span>
                  <span><strong>稀释</strong> ${escapeHtml(record.dilution || "-")}</span>
                  <span><strong>肥料</strong> ${escapeHtml(record.fertilizer || "-")}</span>
                  <span><strong>状态</strong> ${escapeHtml(record.growth || "正常")}${record.pestDiagnosis ? `<span class="record-subtext">${escapeHtml(pestDiagnosisText(record.pestDiagnosis))}</span>` : ""}</span>
                  <span><strong>气温</strong> ${tempText}</span>
                </div>
                ${record.note ? `<div class="record-note">${escapeHtml(record.note)}</div>` : ""}
                <div class="record-actions">
                  <button class="icon-btn" type="button" title="编辑" data-edit="${record.id}">改</button>
                  <button class="icon-btn danger" type="button" title="删除" data-delete="${record.id}">删</button>
                </div>
              </article>
            `;
          }).join("")}
        </div>
        <div class="record-pager">
          <span class="record-page-status">已显示 ${pageVisible.length} / ${visible.length} 条</span>
          ${hasMore ? `<button class="btn secondary" type="button" id="loadMoreRecordsBtn">下一页，再看 ${Math.min(recordPageSize, visible.length - visibleRecordCount)} 条</button>` : ""}
        </div>
      `;

      els.tableWrap.querySelectorAll("[data-edit]").forEach(button => {
        button.addEventListener("click", () => editRecord(button.dataset.edit));
      });
      els.tableWrap.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => deleteRecord(button.dataset.delete));
      });
      els.tableWrap.querySelectorAll(".record-check").forEach(input => {
        input.addEventListener("change", () => {
          if (input.checked) {
            selectedRecordIds.add(input.value);
          } else {
            selectedRecordIds.delete(input.value);
          }
          updateBulkStatus();
        });
      });
      const loadMore = document.getElementById("loadMoreRecordsBtn");
      if (loadMore) {
        loadMore.addEventListener("click", () => {
          visibleRecordCount += recordPageSize;
          renderTable();
        });
      }
    }

    function exportCsv() {
      const rows = [["日期", "作物", "品种", "种植方式", "类型", "用量", "稀释比例", "肥料", "生长情况", "气温", "备注"]];
      getFilteredRecords().forEach(record => {
        rows.push([record.date, record.crop, record.variety || defaultVariety(record.crop), record.planting || "盆栽", record.type, record.amount || "", record.dilution || "", record.fertilizer || "", record.growth || "正常", record.temperature ?? "", record.note || ""]);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `果蔬施肥浇水记录-${today()}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function restoreBackupFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const backup = JSON.parse(String(reader.result || "{}"));
          const restored = migrateOldData({
            stored: {
              plants: backup.plants,
              records: backup.records,
              tasks: backup.tasks,
              materials: backup.materials
            },
            legacy: backup
          });
          if (!Array.isArray(restored.records)) throw new Error("bad backup");
          appData = restored;
          records = appData.records;
          fertilizerStock = Array.isArray(backup.fertilizerStock) ? backup.fertilizerStock : fertilizerStock;
          customFertilizers = Array.isArray(backup.customFertilizers) ? backup.customFertilizers : customFertilizers;
          deletedFertilizers = Array.isArray(backup.deletedFertilizers) ? backup.deletedFertilizers : deletedFertilizers;
          pesticideStock = Array.isArray(backup.pesticideStock) ? backup.pesticideStock : pesticideStock;
          customPesticides = Array.isArray(backup.customPesticides) ? backup.customPesticides : customPesticides;
          deletedPesticides = Array.isArray(backup.deletedPesticides) ? backup.deletedPesticides : deletedPesticides;
          if (Array.isArray(backup.materials)) {
            customFertilizers = appData.materials.filter(item => item.kind === "肥料" && item.status !== "已删除" && !baseFertilizers.includes(item.name)).map(item => item.name);
            deletedFertilizers = appData.materials.filter(item => item.kind === "肥料" && item.status === "已删除").map(item => item.name);
            fertilizerStock = appData.materials.filter(item => item.kind === "肥料" && item.status === "有效" && Number(item.stock) > 0).map(item => item.name);
            customPesticides = appData.materials.filter(item => item.kind === "药剂" && item.status !== "已删除" && !basePesticides.some(base => base.name === item.name)).map(item => item.name);
            deletedPesticides = appData.materials.filter(item => item.kind === "药剂" && item.status === "已删除").map(item => item.name);
            pesticideStock = appData.materials.filter(item => item.kind === "药剂" && item.status === "有效" && Number(item.stock) > 0).map(item => item.name);
          }
          saveData();
          renderFertilizerStock();
          renderPesticideStock();
          refreshAfterFertilizerStockChange();
          renderAll();
          alert("备份已恢复到本机。");
        } catch {
          alert("备份文件无法读取。");
        } finally {
          els.restoreInput.value = "";
        }
      });
      reader.readAsText(file);
    }

        return;
      }
      els.plantPhotoPreview.textContent = "正在压缩...";
      try {
        plantPhotoBase64 = await compressImageToBase64(file);
        previewPlantPhoto(plantPhotoBase64);
      } catch (error) {
        plantPhotoBase64 = "";
        previewPlantPhoto("");
        alert(error.message || "图片处理失败");
      }
    });
    els.detailPhoto.addEventListener("change", async () => {
      const file = els.detailPhoto.files?.[0];
      if (!file) return;
      const plant = appData.plants.find(item => item.id === formPlantId || item.id === selectedPlantId);
      if (!plant) return;
      try {
        const photo = await compressImageToBase64(file);
        createPlantRecord(plant, "拍照", { photo, note: "生长照片" });
      } catch (error) {
        alert(error.message || "图片处理失败");
      }
    });
    els.plantForm.addEventListener("submit", event => {
      event.preventDefault();
      const name = els.plantName.value.trim();
      if (!name) return;
      const category = els.plantCategory.value || name;
      appData.plants.push(normalizePlant({
        id: makeId("plant", name),
        name,
        variety: els.plantVariety.value.trim(),
        category,
        photo: plantPhotoBase64,
        health: els.plantHealth.value,
        createdAt: new Date().toISOString(),
        note: els.plantNote.value.trim()
      }));
      saveData();
      renderAll();
      closePlantModal();
      switchPage("home");
    });
    els.viewTasks.addEventListener("click", () => switchPage("tasks"));
    els.plantDetailBack.addEventListener("click", () => switchPage("home"));
    els.export.addEventListener("click", exportCsv);
    els.backup.addEventListener("click", exportBackup);
    els.restore.addEventListener("click", () => els.restoreInput.click());
    els.restoreInput.addEventListener("change", () => restoreBackupFile(els.restoreInput.files[0]));
    els.sample.addEventListener("click", addSampleData);
    els.pageButtons.forEach(button => {
      button.addEventListener("click", () => switchPage(button.dataset.page));
    });
    els.bulkDelete.addEventListener("click", deleteSelectedRecords);
    els.deleteSelectedFertilizers.addEventListener("click", deleteSelectedFertilizers);
    els.deleteSelectedPesticides.addEventListener("click", deleteSelectedPesticides);
    els.crop.addEventListener("change", () => {
      selectedCrop = els.crop.value;
      resetFormDefaultsForContext();
      renderSeedlingPlans();
    });
    els.planting.addEventListener("change", () => {
      resetFormDefaultsForContext();
    });
    els.addFertilizer.addEventListener("click", () => {
      const name = els.customFertilizer.value.trim();
      if (!name) return;
      deletedFertilizers = deletedFertilizers.filter(item => item !== name);
      if (!customFertilizers.includes(name) && !baseFertilizers.includes(name)) {
        customFertilizers.push(name);
      }
      if (!fertilizerStock.includes(name)) {
        fertilizerStock.push(name);
      }
      els.customFertilizer.value = "";
      saveFertilizerStock();
      renderFertilizerStock();
      refreshAfterFertilizerStockChange();
    });
    els.addPesticide.addEventListener("click", () => {
      const name = els.customPesticide.value.trim();
      if (!name) return;
      deletedPesticides = deletedPesticides.filter(item => item !== name);
      if (!customPesticides.includes(name) && !basePesticides.some(item => item.name === name)) {
        customPesticides.push(name);
      }
      if (!pesticideStock.includes(name)) {
        pesticideStock.push(name);
      }
      els.customPesticide.value = "";
      savePesticideStock();
      renderPesticideStock();
      renderPlans();
    });
    els.planMonth.addEventListener("change", () => {
      renderRecipeOptions();
      renderFormAdvice();
      renderPlans();
    });
    els.type.addEventListener("change", () => {
      renderAmountOptions();
      renderDilutionOptions();
      renderRecordFertilizerOptions(els.type.value === "施肥" ? selectedFertilizerValue() : "");
    });
    els.amount.addEventListener("change", toggleCustomInputs);
    els.fertilizer.addEventListener("change", () => {
      renderFertilizerDoseRows(selectedFertilizerItems());
      toggleCustomInputs();
    });
    els.customFertilizerRecord.addEventListener("input", () => {
      renderFertilizerDoseRows(selectedFertilizerItems());
      toggleCustomInputs();
    });
    els.recipe.addEventListener("change", applyRecipeOption);
    els.dilution.addEventListener("change", toggleCustomInputs);
    els.growth.addEventListener("change", () => {
      togglePestPanel();
      syncPestAction();
      renderRecipeOptions();
      renderFormAdvice();
      renderPlans();
    });
    [els.pestProblem, els.pestPart, els.pestSeverity].forEach(input => {
      input.addEventListener("change", () => {
        syncPestAction();
        renderRecipeOptions();
        renderFormAdvice();
        renderPlans();
      });
    });
    els.pestAction.addEventListener("change", () => {
      renderRecipeOptions();
      renderFormAdvice();
      renderPlans();
    });
    els.temperature.addEventListener("input", () => {
      renderRecipeOptions();
      renderFormAdvice();
      renderPlans();
    });
    els.note.addEventListener("input", () => {
      renderRecipeOptions();
      renderFormAdvice();
      renderPlans();
    });
    [els.search, els.cropFilter, els.typeFilter].forEach(input => {
      input.addEventListener("input", () => {
        visibleRecordCount = recordPageSize;
        renderTable();
      });
      input.addEventListener("change", () => {
        visibleRecordCount = recordPageSize;
        renderTable();
      });
    });

    renderFilters();
    renderMonthOptions();
    renderFertilizerStock();
    renderPesticideStock();
    resetForm();
    resetTaskForm();
    resetMaterialForm();
    renderAll();
    requestPersistentStorage();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
